<!-- =============================================
      KLP 8: DAILY DOA (STEADFAST DYNAMIC HEADER)
      ============================================= -->
<section id="module-doa">
    <style>
        .doa-header-premium { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); padding: calc(40px + env(safe-area-inset-top)) 20px 45px 20px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; box-shadow: 0 10px 25px -5px rgba(13, 148, 136, 0.3); z-index: 50; position: sticky; top: 0; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .doa-header-slim { padding: calc(10px + env(safe-area-inset-top)) 20px 15px 20px; border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        .doa-glassbox { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px; padding: 20px; text-align: center; transition: all 0.4s ease; overflow: hidden; display: flex; justify-content: center; align-items: center; margin-top: 0px; margin-left: 10px; margin-right: 10px; }
        .doa-header-slim .doa-glassbox { padding: 10px 18px; border-radius: 15px; }
        .doa-item-card { padding: 0.85rem 1.1rem; background: white; border-radius: 1.25rem; margin-bottom: 12px; border: 1px solid #f1f5f9; display: flex; align-items: center; gap: 12px; }
        .doa-number { width: 32px; height: 32px; background: #f0fdfa; color: #0d9488; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; border: 1px solid #ccfbf1; }
        .doa-title-text { flex: 1; font-weight: 700; font-size: 13px; color: #334155; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    </style>

    <div id="doa-modal" class="modal-full">
        <div id="doa-sticky-header" class="doa-header-premium">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="p-2 bg-white/10 rounded-xl text-white shrink-0"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="doa-glassbox flex-1"><h2 id="doa-header-title" class="text-white text-sm font-extrabold uppercase tracking-widest leading-none">Kumpulan Doa</h2></div>
                <div class="w-10"></div>
            </div>
        </div>
        <div id="doa-content" onscroll="handleDoaScroll(this)" class="flex-1 overflow-y-auto p-5 bg-slate-50 pb-24"></div>
    </div>

<script>
    /* 1. DATA MASTER DOA */
    const dataDoaMadasa = [
        { id: 1, judul: "Al Mulk", path: "datadoa/almulk.json" },
        { id: 2, judul: "Doa Bangun Tidur", path: "datadoa/doabanguntidur.json" },
        { id: 3, judul: "Doa Masuk Masjid", path: "datadoa/doamasukmasjid.json" },
        { id: 4, judul: "Doa Untuk Orang Tua", path: "datadoa/doaorangtua.json" },
        { id: 5, judul: "Doa Sapu Jagad", path: "datadoa/doasapujagad.json" }
    ];

    /* 2. LOGIKA SCROLL HEADER (EFEK SLIM) */
    function handleDoaScroll(el) {
        const header = document.getElementById('doa-sticky-header');
        header.classList.toggle('doa-header-slim', el.scrollTop > 50);
    }

    /* 3. FUNGSI TOGGLE MODAL DOA */
    function toggleDoa() {
        const el = document.getElementById('doa-modal');
        if (!el.classList.contains('modal-show')) {
            // Push state awal untuk level LIST
            pushState('doa', { doa_view: 'list' });
            el.classList.add('modal-show');
            loadDoaList();
        } else {
            // Pemicu tombol back browser
            window.history.back();
        }
    }

    /* 4. FUNGSI RENDER DAFTAR DOA (LIST VIEW) */
    function loadDoaList() {
        const titleEl = document.getElementById('doa-header-title');
        const content = document.getElementById('doa-content');
        const header = document.getElementById('doa-sticky-header');

        titleEl.innerText = "Kumpulan Doa";
        content.scrollTop = 0;
        header.classList.remove('doa-header-slim');

        content.innerHTML = dataDoaMadasa.map((d, index) => `
            <div onclick="loadDoaDetail(${d.id})" class="doa-item-card">
                <div class="doa-number">${index + 1}</div>
                <span class="doa-title-text">${d.judul}</span>
                <i class="fa-solid fa-chevron-right text-slate-300 text-[10px]"></i>
            </div>
        `).join('');
    }

    /* 5. FUNGSI RENDER ISI DOA (DETAIL VIEW) */
    async function loadDoaDetail(id) {
        // Tambahkan history baru untuk level DETAIL
        pushState('doa', { doa_view: 'detail' });

        const content = document.getElementById('doa-content');
        const dInfo = dataDoaMadasa.find(i => i.id === id);
        const header = document.getElementById('doa-sticky-header');
        const titleEl = document.getElementById('doa-header-title');

        content.scrollTop = 0;
        header.classList.remove('doa-header-slim');
        titleEl.innerText = dInfo.judul;

        // Loading State
        content.innerHTML = `
            <div class="text-center py-20 animate-pulse text-teal-600 font-bold text-[10px] uppercase">
                Mengambil Berkah...
            </div>`;

        try {
            const response = await fetch(dInfo.path);
            const d = await response.json();

            // Cek jika ada arti, jika tidak kosongkan
            const tampilanArti = d.arti && d.arti.trim() !== "" 
                ? `<div class="w-12 h-1 bg-teal-50 mx-auto mb-6 rounded-full"></div>
                   <p class="text-sm text-slate-500 italic leading-relaxed">"${d.arti}"</p>` 
                : "";

            content.innerHTML = `
                <div class="bg-white p-8 rounded-3xl text-center shadow-sm border border-slate-100">
                    <h3 class="font-arab text-xl text-teal-600 mb-4 leading-none">بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ</h3>
                    <div class="w-full h-[1px] bg-slate-100 mb-8"></div>
                    <p class="font-arab text-3xl mb-8 leading-[2.5] text-justify" style="text-align-last: center;" dir="rtl">
                        ${d.arab}
                    </p>
                    ${tampilanArti}
                </div>
                <div class="mt-8 text-center">
                    <button onclick="window.history.back()" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <i class="fa-solid fa-arrow-left mr-2"></i> Kembali ke Daftar
                    </button>
                </div>`;
        } catch (e) {
            content.innerHTML = `
                <div class="text-center p-10 text-xs text-red-400 font-bold uppercase">
                    Gagal memuat doa.
                </div>`;
        }
    }
</script>
</section>
