<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Saya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .app-bg { background-color: #f3f4f6; }
        .bottom-nav { border-radius: 20px 20px 0 0; }
    </style>
</head>
<body class="app-bg font-sans pb-20">

    <!-- Header -->
    <header class="bg-white p-4 sticky top-0 z-50 shadow-sm flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-emerald-600 text-white w-8 h-8 rounded-lg flex items-center justify-center font-bold">A</div>
            <h1 class="text-xl font-bold tracking-tight">AppSaya</h1>
        </div>
        <i class="fa-regular fa-bell text-gray-500 text-xl"></i>
    </header>

    <!-- Main Content -->
    <div id="app" class="max-w-md mx-auto">
        <!-- Hero Banner -->
        <div class="p-4">
            <div class="bg-emerald-700 rounded-3xl p-6 text-white shadow-lg">
                <p class="opacity-80 text-sm">Assalamualaikum, Batukessel</p>
                <h2 id="prayer-time" class="text-2xl font-bold mt-1 tracking-wide">Memuat Jadwal...</h2>
            </div>
        </div>

        <!-- Menu Grid -->
        <div class="grid grid-cols-4 gap-4 px-4 py-2 text-center" id="main-menu">
            <!-- Menu items will be injected by JS -->
        </div>

        <!-- News Feed -->
        <div class="p-4">
            <h3 class="font-bold text-lg mb-4">Artikel Terbaru</h3>
            <div id="news-container" class="space-y-4">
                <!-- News items will be injected by JS -->
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white shadow-[0_-2px_10px_rgba(0,0,0,0.05)] flex justify-around items-center py-3 bottom-nav">
        <a href="#" class="flex flex-col items-center text-emerald-600">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] mt-1">Beranda</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-book-quran text-xl"></i>
            <span class="text-[10px] mt-1">Quran</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-mosque text-xl"></i>
            <span class="text-[10px] mt-1">Jadwal</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-user text-xl"></i>
            <span class="text-[10px] mt-1">Profil</span>
        </a>
    </nav>

    <script src="app.js"></script>
</body>
</html>
