<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplikasi Islami Saya</title>
    <!-- Framework Tailwind CSS & Font Awesome -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Desain Header Setengah Lingkaran */
        .header-arch {
            background: linear-gradient(135deg, #064e3b 0%, #059669 100%);
            border-radius: 0 0 50% 50% / 0 0 15% 15%;
            height: 220px;
        }

        /* Navigasi Bawah Melengkung */
        .bottom-nav {
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -4px 15px rgba(0, 0, 0, 0.05);
        }

        /* Menghilangkan scrollbar agar terlihat clean di mobile */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body class="pb-24">

    <!-- Header Section -->
    <header class="header-arch w-full px-6 pt-10 text-white relative">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-white text-emerald-800 w-10 h-10 rounded-full flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-mosque text-lg"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">AppSaya</h1>
                    <p class="text-[10px] opacity-70 uppercase tracking-widest">Portal Islami Modern</p>
                </div>
            </div>
            <div class="flex gap-3">
                <button class="w-10 h-10 bg-white/10 rounded-full backdrop-blur-md flex items-center justify-center">
                    <i class="fa-solid fa-magnifying-glass text-sm"></i>
                </button>
                <button class="w-10 h-10 bg-white/10 rounded-full backdrop-blur-md flex items-center justify-center">
                    <i class="fa-solid fa-bell text-sm"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-md mx-auto px-4">
        
        <!-- Hero Card (Overlap ke Header) -->
        <section class="-mt-24 relative z-10">
            <div class="bg-white rounded-3xl p-6 shadow-xl border border-emerald-50">
                <div class="flex justify-between items-start">
                    <div>
                        <p class="text-gray-400 text-xs font-medium uppercase tracking-wider">Jadwal Berikutnya</p>
                        <h2 id="prayer-name" class="text-emerald-900 text-3xl font-bold mt-1 uppercase">Dzuhur</h2>
                        <p id="prayer-time" class="text-emerald-600 text-lg font-semibold mt-1 italic">12:05 WIB</p>
                    </div>
                    <div class="text-right text-gray-400">
                        <p class="text-xs font-bold uppercase" id="current-date"></p>
                        <p class="text-[10px]" id="hijri-date">07 Syawal 1447 H</p>
                    </div>
                </div>
                <div class="mt-6 pt-4 border-t border-gray-50 flex items-center justify-between text-xs text-gray-500">
                    <div class="flex items-center gap-2">
                        <i class="fa-solid fa-location-dot text-emerald-500"></i>
                        <span>Jakarta, Indonesia</span>
                    </div>
                    <i class="fa-solid fa-chevron-right opacity-30"></i>
                </div>
            </div>
        </section>

        <!-- Main Menu Grid -->
        <section class="grid grid-cols-4 gap-4 mt-8" id="main-menu">
            <!-- Menu diisi via JavaScript -->
        </section>

        <!-- Artikel Section -->
        <section class="mt-10">
            <div class="flex justify-between items-end mb-4">
                <h3 class="font-bold text-lg text-gray-800">Inspirasi Hari Ini</h3>
                <a href="#" class="text-emerald-600 text-xs font-bold">Lihat Semua</a>
            </div>
            <div id="article-feed" class="space-y-4">
                <!-- Artikel diisi via JavaScript -->
            </div>
        </section>

    </main>

    <!-- Bottom Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white bottom-nav px-6 py-4 flex justify-around items-center z-50">
        <a href="#" class="flex flex-col items-center text-emerald-600">
            <i class="fa-solid fa-house-chimney text-xl"></i>
            <span class="text-[10px] mt-1 font-bold">Beranda</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-book-quran text-xl"></i>
            <span class="text-[10px] mt-1">Al-Quran</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-hands-praying text-xl"></i>
            <span class="text-[10px] mt-1">Doa</span>
        </a>
        <a href="#" class="flex flex-col items-center text-gray-400">
            <i class="fa-solid fa-circle-user text-xl"></i>
            <span class="text-[10px] mt-1">Profil</span>
        </a>
    </nav>

    <!-- Logic Script -->
    <script>
        // Data Dummy (Nanti bisa dipindah ke data.json)
        const appData = {
            menu: [
                { name: 'Quran', icon: 'fa-book-open', color: 'bg-blue-50 text-blue-600' },
                { name: 'Shalat', icon: 'fa-clock', color: 'bg-emerald-50 text-emerald-600' },
                { name: 'Zakat', icon: 'fa-hand-holding-heart', color: 'bg-orange-50 text-orange-600' },
                { name: 'Kiblat', icon: 'fa-compass', color: 'bg-purple-50 text-purple-600' }
            ],
            articles: [
                { title: 'Menjaga Lisan di Era Digital', category: 'Akhlak', time: '10m ago', img: 'https://images.unsplash.com/photo-1507502707541-f369a3b18502?w=200' },
                { title: 'Rahasia Khusyuk dalam Beribadah', category: 'Fiqih', time: '1h ago', img: 'https://images.unsplash.com/photo-1542810634-71277d95dcbb?w=200' }
            ]
        };

        function initApp() {
            // Render Tanggal
            const now = new Date();
            const options = { day: 'numeric', month: 'short', year: 'numeric' };
            document.getElementById('current-date').innerText = now.toLocaleDateString('id-ID', options);

            // Render Menu
            const menuHtml = appData.menu.map(item => `
                <div class="flex flex-col items-center gap-2">
                    <div class="${item.color} w-14 h-14 rounded-2xl flex items-center justify-center text-xl shadow-sm border border-white">
                        <i class="fa-solid ${item.icon}"></i>
                    </div>
                    <span class="text-[11px] font-semibold text-gray-600">${item.name}</span>
                </div>
            `).join('');
            document.getElementById('main-menu').innerHTML = menuHtml;

            // Render Artikel
            const articleHtml = appData.articles.map(art => `
                <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm flex gap-4 transition-transform active:scale-95">
                    <img src="${art.img}" class="w-20 h-20 object-cover rounded-xl bg-gray-100" />
                    <div class="flex flex-col justify-center">
                        <span class="text-[10px] font-bold text-emerald-600 uppercase tracking-tighter">${art.category}</span>
                        <h4 class="font-bold text-sm text-gray-800 leading-snug mt-1">${art.title}</h4>
                        <p class="text-[10px] text-gray-400 mt-2 italic">${art.time}</p>
                    </div>
                </div>
            `).join('');
            document.getElementById('article-feed').innerHTML = articleHtml;
        }

        window.onload = initApp;
    </script>
</body>
</html>
