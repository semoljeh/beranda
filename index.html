<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Darussalam">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/semoljeh/link/main/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;900&display=swap');
        
        @font-face {
            font-family: 'LPMQ';
            src: url('https://kemenag.go.id/assets/fonts/lpmq.ttf');
        }

        .font-arab { font-family: 'LPMQ', serif; }
        .font-times { font-family: 'Times New Roman', Times, serif; }

        body { font-family: 'Poppins', sans-serif; background-color: #f0fdfa; display: flex; justify-content: center; margin:0; }
        .app-container { width: 100%; max-width: 500px; background-color: white; min-height: 100vh; position: relative; padding-bottom: 100px; box-shadow: 0 0 40px rgba(0,0,0,0.08); }
        
        /* Header Modern - Center Aligned */
        .header-bg { background-color: #0d9488; height: 210px; border-radius: 0 0 50px 50px; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 35px; }

        /* Lokasi Capsule - Small & Responsive */
        .location-capsule {
            display: flex; align-items: center; gap: 8px; background-color: rgba(255,255,255,0.12);
            padding: 6px 16px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.25);
            cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(8px);
        }
        .location-capsule:active { transform: scale(0.95); background-color: rgba(255,255,255,0.2); }

        .info-capsule {
            position: absolute; bottom: -85px; left: 50%; transform: translateX(-50%); width: 88%;
            background: white; border-radius: 35px; padding: 25px;
            box-shadow: 0 20px 40px rgba(13, 148, 136, 0.15); border: 1px solid #f1f5f9; z-index: 20;
        }

        .menu-card {
            background: white; border-radius: 24px; padding: 22px; display: flex; flex-direction: column;
            align-items: center; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid #f1f5f9; transition: all 0.3s;
        }
        .menu-card:active { transform: scale(0.92); background-color: #f0fdfa; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background-color: white; display: flex; justify-content: space-around;
            padding: 16px 0; border-top: 1px solid #f1f5f9; box-shadow: 0 -10px 25px rgba(0,0,0,0.04);
            z-index: 100; border-radius: 30px 30px 0 0;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #0d9488; cursor: pointer; }
        
        #quran-modal { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; }
        .hidden-quran { transform: translateY(100%); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-bg">
            <div onclick="toggleLocationSheet()" class="location-capsule">
                <div class="bg-white rounded-full w-5 h-5 flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-location-dot text-[#0d9488] text-[8px]"></i>
                </div>
                <span id="location-text" class="text-[9px] font-black text-white uppercase tracking-[0.15em] italic truncate max-w-[140px]">
                    Mencari Lokasi...
                </span>
                <i class="fa-solid fa-chevron-down text-white/60 text-[8px]"></i>
            </div>

            <div class="info-capsule">
                <div class="flex items-center justify-between border-b border-dashed border-gray-100 pb-5 mb-4">
                    <div class="flex-1 text-center border-r border-gray-100">
                        <span id="prayer-name" class="text-[10px] text-teal-600 font-black uppercase tracking-[0.2em] mb-1 block">---</span>
                        <h2 id="prayer-time" class="text-4xl font-black text-gray-800 tracking-tighter leading-none">--:--</h2>
                    </div>
                    <div class="flex-1 text-center">
                        <div class="flex items-center justify-center gap-1.5 mb-1.5 text-red-500 font-black tracking-tighter">
                            <span class="text-[9px] uppercase">Mendatang</span>
                            <i class="fa-solid fa-clock-rotate-left text-[9px]"></i>
                        </div>
                        <span id="countdown" class="text-xs font-black text-gray-500 font-mono tracking-tight">-00:00:00</span>
                    </div>
                </div>
                <div class="text-center">
                    <p id="full-date" class="text-[10px] font-bold text-gray-700 uppercase font-times tracking-tighter mb-0.5"></p>
                    <p id="java-hijri" class="text-[10px] text-emerald-600 font-medium font-arab tracking-wider" dir="rtl"></p>
                </div>
            </div>
        </div>

        <div class="mt-32 text-center px-6">
            <h1 class="text-3xl font-black text-teal-900 tracking-tighter uppercase">Darussalam Online</h1>
            <p class="text-[10px] text-gray-400 mt-1 uppercase font-bold tracking-[0.4em]">Digital Hub Platform</p>
        </div>

        <div class="grid grid-cols-2 gap-5 p-7 mt-2">
            <div class="menu-card">
                <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center mb-4 text-emerald-700 text-2xl shadow-inner">
                    <i class="fa-solid fa-mosque"></i>
                </div>
                <span class="text-[11px] font-black text-gray-700 font-times uppercase tracking-tight">Profil Madrasah</span>
            </div>
            <div class="menu-card">
                <div class="w-14 h-14 bg-blue-50 rounded-2xl flex items-center justify-center mb-4 text-blue-700 text-2xl shadow-inner">
                    <i class="fa-solid fa-book-open"></i>
                </div>
                <span class="text-[11px] font-black text-gray-700 font-times uppercase tracking-tight">Kegiatan Santri</span>
            </div>
            <div class="menu-card">
                <div class="w-14 h-14 bg-gray-50 rounded-2xl flex items-center justify-center mb-4 text-gray-700 text-2xl shadow-inner">
                    <i class="fa-solid fa-file-signature"></i>
                </div>
                <span class="text-[11px] font-black text-gray-700 font-times uppercase tracking-tight">Pendaftaran</span>
            </div>
            <div class="menu-card">
                <div class="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mb-4 text-red-600 text-2xl shadow-inner">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <span class="text-[11px] font-black text-gray-700 font-times uppercase tracking-tight">Program Donasi</span>
            </div>
        </div>

        <footer class="mt-4 mb-8 text-center px-10">
            <p class="text-[9px] text-gray-300 font-times uppercase italic tracking-widest">Versi 2.2 • 2026 All Rights Reserved</p>
        </footer>

        <nav class="bottom-nav">
            <a onclick="location.reload()" class="nav-item">
                <i class="fa-solid fa-house-user text-xl mb-1"></i>
                <span class="text-[9px] font-bold">BERANDA</span>
            </a>
            <a onclick="toggleQuran()" class="nav-item">
                <i class="fa-solid fa-book-quran text-xl mb-1"></i>
                <span class="text-[9px] font-bold">AL-QURAN</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-hands-praying text-xl mb-1"></i>
                <span class="text-[9px] font-bold">DOA</span>
            </a>
        </nav>
    </div>

    <div id="quran-modal" class="fixed inset-0 bg-white hidden-quran flex flex-col max-w-[500px] mx-auto shadow-2xl">
        <div class="bg-teal-700 p-5 text-white flex justify-between items-center shadow-lg">
            <button onclick="toggleQuran()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-black text-[10px] tracking-[0.3em] uppercase">Al-Quran Digital</h2>
            <button onclick="toggleTranslation()" id="btn-trans" class="text-[8px] bg-white/20 px-3 py-2 rounded-lg border border-white/20 font-black uppercase">Hide Translation</button>
        </div>
        <div id="quran-content" class="flex-1 overflow-y-auto p-5 bg-slate-50 pb-24">
            <div class="text-center py-20 text-gray-400">
                <i class="fa-solid fa-spinner animate-spin text-3xl mb-4 text-teal-600"></i>
                <p class="text-[9px] uppercase font-black tracking-[0.5em]">Loading...</p>
            </div>
        </div>
    </div>

    <div id="location-sheet-bg" onclick="toggleLocationSheet()" class="fixed inset-0 bg-black/60 z-[250] hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm"></div>
    <div id="location-sheet" class="fixed bottom-0 left-0 right-0 bg-white z-[300] rounded-t-[45px] p-8 translate-y-full transition-transform duration-500 ease-in-out max-w-[500px] mx-auto shadow-2xl">
        <div class="w-16 h-1.5 bg-gray-100 rounded-full mx-auto mb-8"></div>
        <h3 class="text-xl font-black text-teal-900 mb-2 uppercase text-center">Set Lokasi</h3>
        <p class="text-[10px] text-gray-400 mb-8 font-times uppercase tracking-widest text-center italic">Sinkronisasi Jadwal Sholat</p>
        
        <div class="space-y-4">
            <button onclick="getCoreData(); toggleLocationSheet()" class="w-full flex items-center gap-5 p-5 rounded-3xl bg-teal-50 border border-teal-100 active:scale-95 transition-all">
                <div class="w-12 h-12 bg-teal-500 rounded-2xl flex items-center justify-center text-white text-xl shadow-lg">
                    <i class="fa-solid fa-crosshairs"></i>
                </div>
                <div class="text-left">
                    <p class="text-sm font-black text-teal-900 uppercase">GPS Otomatis</p>
                    <p class="text-[10px] text-teal-600 uppercase font-black tracking-tighter italic">Deteksi Akurat</p>
                </div>
            </button>

            <div class="relative">
                <input type="text" id="manual-city-input" placeholder="CARI KOTA..." class="w-full p-5 pl-14 rounded-3xl bg-gray-50 border border-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 transition-all font-bold uppercase tracking-tight">
                <i class="fa-solid fa-magnifying-glass absolute left-6 top-1/2 -translate-y-1/2 text-gray-400"></i>
                <button onclick="handleManualSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 bg-teal-800 text-white text-[9px] px-5 py-3 rounded-2xl font-black uppercase tracking-tighter">Cari</button>
            </div>
        </div>
    </div>

    <script>
        let nextPrayerTime = null;
        let showTranslation = true;

        // --- CORE FUNCTIONS ---
        function updateDates() {
            const now = new Date();
            const hari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const pasaran = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
            const refDate = new Date(1900, 0, 1);
            const diffDays = Math.floor((now - refDate) / 86400000);
            const masehiStr = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long' }) + " 2026 M";
            document.getElementById('full-date').innerText = `${hari[now.getDay()]} ${pasaran[(diffDays + 1) % 5]}, ${masehiStr}`;
            document.getElementById('java-hijri').innerText = `Tahun Jawa 1959 AJ / 1447 H`;
        }

        async function getCoreData() {
            const cachedLocation = localStorage.getItem('last_location');
            const cachedTimings = localStorage.getItem('last_timings');

            if (cachedLocation) document.getElementById('location-text').innerText = cachedLocation;
            if (cachedTimings) setPrayerUI(JSON.parse(cachedTimings));

            if (navigator.onLine && navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    try {
                        const locRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
                        const locData = await locRes.json();
                        const addr = locData.address;
                        const displayLoc = addr.village || addr.suburb || addr.neighbourhood || addr.city_district || addr.city || "Lokasi Aktif";
                        
                        document.getElementById('location-text').innerText = displayLoc;
                        localStorage.setItem('last_location', displayLoc);

                        const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                        const json = await res.json();
                        setPrayerUI(json.data.timings);
                        localStorage.setItem('last_timings', JSON.stringify(json.data.timings));
                    } catch(e) { console.log("Cache Used."); }
                }, null, { enableHighAccuracy: true });
            }
        }

        function setPrayerUI(timings) {
            const now = new Date();
            const currentTotal = (now.getHours() * 60) + now.getMinutes();
            const schedule = [
                { name:'Subuh', time:timings.Fajr }, { name:'Dzuhur', time:timings.Dhuhr }, 
                { name:'Ashar', time:timings.Asr }, { name:'Maghrib', time:timings.Maghrib }, 
                { name:'Isya', time:timings.Isha }
            ];
            let next = schedule.find(s => {
                const [h, m] = s.time.split(':');
                return (parseInt(h) * 60 + parseInt(m)) > currentTotal;
            }) || schedule[0];

            document.getElementById('prayer-name').innerText = next.name;
            document.getElementById('prayer-time').innerText = next.time;
            const [tH, tM] = next.time.split(':');
            nextPrayerTime = new Date();
            nextPrayerTime.setHours(parseInt(tH), parseInt(tM), 0);
            if (nextPrayerTime < now) nextPrayerTime.setDate(nextPrayerTime.getDate() + 1);
        }

        function startCountdown() {
            setInterval(() => {
                if (!nextPrayerTime) return;
                const diff = nextPrayerTime - new Date();
                if (diff <= 0) { getCoreData(); return; }
                const h = Math.floor(diff / 3600000).toString().padStart(2,'0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
                document.getElementById('countdown').innerText = `-${h}:${m}:${s}`;
            }, 1000);
        }

        // --- INTERFACE FUNCTIONS ---
        function toggleLocationSheet() {
            const sheet = document.getElementById('location-sheet');
            const bg = document.getElementById('location-sheet-bg');
            if (sheet.classList.contains('translate-y-full')) {
                bg.classList.remove('hidden');
                setTimeout(() => bg.classList.add('opacity-100'), 10);
                sheet.classList.remove('translate-y-full');
            } else {
                bg.classList.remove('opacity-100');
                sheet.classList.add('translate-y-full');
                setTimeout(() => bg.classList.add('hidden'), 300);
            }
        }

        async function handleManualSearch() {
            const city = document.getElementById('manual-city-input').value;
            if (!city) return;
            document.getElementById('location-text').innerText = "...";
            toggleLocationSheet();
            try {
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}&limit=1`);
                const geoData = await geoRes.json();
                if (geoData.length > 0) {
                    const { lat, lon, display_name } = geoData[0];
                    const shortName = display_name.split(',')[0];
                    document.getElementById('location-text').innerText = shortName;
                    localStorage.setItem('last_location', shortName);
                    const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                    const json = await res.json();
                    setPrayerUI(json.data.timings);
                    localStorage.setItem('last_timings', JSON.stringify(json.data.timings));
                }
            } catch (e) { alert("Perlu Internet."); }
        }

        function toggleQuran() {
            const modal = document.getElementById('quran-modal');
            if (modal.classList.contains('hidden-quran')) {
                modal.classList.remove('hidden-quran');
                modal.classList.add('show-quran');
                loadSurahList();
            } else {
                modal.classList.remove('show-quran');
                modal.classList.add('hidden-quran');
            }
        }

        function toggleTranslation() {
            showTranslation = !showTranslation;
            const transElements = document.querySelectorAll('.translation-text');
            const btn = document.getElementById('btn-trans');
            transElements.forEach(el => el.style.display = showTranslation ? 'block' : 'none');
            btn.innerText = showTranslation ? 'Hide Translation' : 'Show Translation';
        }

        async function loadSurahList() {
            const content = document.getElementById('quran-content');
            try {
                const res = await fetch('https://equran.id/api/v2/surat');
                const data = await res.json();
                let html = '<div class="grid grid-cols-1 gap-4">';
                data.data.forEach(surah => {
                    html += `<div onclick="loadDetailSurah(${surah.nomor})" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex justify-between items-center active:scale-95 transition-transform"><div class="flex items-center gap-4"><span class="w-10 h-10 bg-teal-50 text-teal-700 rounded-2xl flex items-center justify-center text-[10px] font-black">${surah.nomor}</span><div><h4 class="font-black text-sm text-slate-800 tracking-tighter uppercase">${surah.namaLatin}</h4><p class="text-[9px] text-slate-400 uppercase font-black tracking-widest">${surah.arti} • ${surah.jumlahAyat} Ayat</p></div></div><span class="font-arab text-2xl text-teal-600">${surah.nama}</span></div>`;
                });
                content.innerHTML = html + '</div>';
            } catch (e) { content.innerHTML = '<p class="text-center py-10">Offline.</p>'; }
        }

        async function loadDetailSurah(nomor) {
            const content = document.getElementById('quran-content');
            content.innerHTML = `<div class="text-center py-20"><i class="fa-solid fa-spinner animate-spin text-3xl text-teal-600"></i></div>`;
            try {
                const res = await fetch(`https://equran.id/api/v2/surat/${nomor}`);
                const data = await res.json();
                const surah = data.data;
                let html = `<div class="bg-teal-700 p-8 rounded-[40px] text-white text-center mb-8 shadow-xl"><h3 class="font-arab text-5xl mb-3">${surah.nama}</h3><p class="font-black text-[10px] text-teal-100 uppercase tracking-[0.4em]">${surah.namaLatin} • ${surah.arti}</p></div><div class="space-y-12">`;
                surah.ayat.forEach(ayat => {
                    html += `<div class="border-b border-slate-100 pb-10"><div class="flex justify-between items-start gap-6 mb-8"><span class="bg-teal-50 text-teal-600 text-[10px] w-8 h-8 flex items-center justify-center rounded-xl font-black shadow-sm">${ayat.nomorAyat}</span><p class="font-arab text-4xl text-right leading-[2.5] text-slate-800 w-full" dir="rtl">${ayat.teksArab}</p></div><p class="translation-text text-sm text-slate-500 font-times italic border-l-4 border-teal-100 pl-6" style="display: ${showTranslation ? 'block' : 'none'}">${ayat.teksIndonesia}</p></div>`;
                });
                content.innerHTML = html + `</div><button onclick="loadSurahList()" class="w-full mt-10 py-5 bg-teal-50 text-teal-700 rounded-3xl font-black text-[10px] uppercase border border-teal-100 active:scale-95 transition-transform">KEMBALI</button>`;
            } catch (e) { content.innerHTML = '<p class="text-center">Error.</p>'; }
        }

        // --- INIT ---
        updateDates(); getCoreData(); startCountdown();
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }
    </script>
</body>
</html>
