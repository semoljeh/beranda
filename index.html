<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Darussalam">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/semoljeh/link/main/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        @font-face {
            font-family: 'LPMQ';
            src: url('https://kemenag.go.id/assets/fonts/lpmq.ttf');
        }

        .font-arab { font-family: 'LPMQ', serif; }
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; margin:0; color: #1e293b; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; background-color: white; min-height: 100vh; position: relative; padding-bottom: 120px; }
        
        .header-bg { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); height: 220px; border-radius: 0 0 40px 40px; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }

        .location-capsule { display: flex; align-items: center; gap: 6px; background-color: rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; backdrop-filter: blur(4px); transition: transform 0.2s; }
        .location-capsule:active { transform: scale(0.95); }

        .info-capsule { position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%); width: 90%; background: white; border-radius: 30px; padding: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; z-index: 20; }

        .menu-card { background: #ffffff; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; text-align: center; border: 1px solid #f1f5f9; transition: transform 0.2s ease; }
        .menu-card:active { transform: scale(0.96); background-color: #f8fafc; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0 28px 0; border-top: 1px solid #f1f5f9; z-index: 100; }
        
        .nav-item { color: #0d9488; transition: all 0.2s ease; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-weight: 500; }
        .nav-item.active { font-weight: 700; }

        .modal-full { position: fixed; inset: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }
        .modal-show { transform: translateY(0) !important; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
        .calendar-day-head { text-align: center; font-size: 10px; font-weight: 800; color: #94a3b8; padding: 10px 0; }
        .calendar-date { aspect-ratio: 1/1.3; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; position: relative; border: 1px solid #f8fafc; }
        .date-masehi { font-size: 13px; font-weight: 700; }
        .date-hijri { font-size: 8px; color: #0d9488; font-weight: 600; }
        .date-pasaran { font-size: 7px; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-top: 1px; }
        .date-today { background: #0d9488; color: white !important; }
        .date-today .date-hijri, .date-today .date-pasaran { color: white; }
        .date-holiday { color: #ef4444; }

        .audio-btn { width: 32px; height: 32px; border-radius: 50%; background: #f0fdf4; color: #0d9488; display: flex; align-items: center; justify-content: center; transition: all 0.2s; border: 1px solid #dcfce7; }
        .audio-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-bg">
            <div onclick="toggleLocationSheet()" class="location-capsule">
                <i class="fa-solid fa-location-dot text-white text-[10px]"></i>
                <span id="location-text" class="text-[11px] font-semibold text-white tracking-tight truncate max-w-[150px]">Mencari...</span>
                <i class="fa-solid fa-chevron-down text-white/50 text-[9px]"></i>
            </div>

            <div class="info-capsule">
                <div class="flex items-center justify-between">
                    <div class="flex-1 text-center border-r border-slate-100">
                        <p id="prayer-name" class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-1">---</p>
                        <h2 id="prayer-time" class="text-4xl font-bold text-slate-800 tracking-tight leading-none">--:--</h2>
                    </div>
                    <div class="flex-1 text-center">
                        <p class="text-[10px] text-red-400 font-bold uppercase tracking-[0.15em] mb-1">Mendatang</p>
                        <span id="countdown" class="text-xl font-semibold text-slate-700 font-mono tracking-tighter">-00:00:00</span>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-slate-50 text-center">
                    <p id="full-date" class="text-[11px] font-medium text-slate-500 mb-1"></p>
                    <p id="java-hijri" class="text-xs text-teal-600 font-semibold tracking-tight"></p>
                </div>
            </div>
        </div>

        <div class="mt-24 text-center px-8">
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">Darussalam Online</h1>
            <p class="text-xs text-slate-400 font-medium">Digital Portal Madrasah</p>
        </div>

        <div class="grid grid-cols-2 gap-4 p-6">
            <div class="menu-card"><div class="w-12 h-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-mosque"></i></div><span class="text-xs font-semibold text-slate-700 uppercase tracking-tight">Profil</span></div>
            <div class="menu-card"><div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-book-open"></i></div><span class="text-xs font-semibold text-slate-700 uppercase tracking-tight">Kegiatan</span></div>
            <div class="menu-card"><div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-file-signature"></i></div><span class="text-xs font-semibold text-slate-700 uppercase tracking-tight">Daftar</span></div>
            <div class="menu-card"><div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-heart-pulse"></i></div><span class="text-xs font-semibold text-slate-700 uppercase tracking-tight">Donasi</span></div>
        </div>

        <nav class="bottom-nav">
            <a onclick="location.reload()" class="nav-item active"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[10px] mt-1">Beranda</span></a>
            <a onclick="toggleQuran()" class="nav-item"><i class="fa-solid fa-book-quran text-xl"></i><span class="text-[10px] mt-1">Quran</span></a>
            <a onclick="toggleCalendar()" class="nav-item"><i class="fa-solid fa-calendar-days text-xl"></i><span class="text-[10px] mt-1">Kalender</span></a>
            <a onclick="toggleDoa()" class="nav-item"><i class="fa-solid fa-hands-praying text-xl"></i><span class="text-[10px] mt-1">Doa</span></a>
        </nav>
    </div>

    <div id="quran-modal" class="modal-full">
        <div class="bg-teal-700 p-5 text-white flex justify-between items-center shadow-md">
            <button onclick="toggleQuran()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-bold text-xs uppercase tracking-widest">Al-Quran Pro</h2>
            <div class="w-10"></div>
        </div>
        <div id="quran-content" class="flex-1 overflow-y-auto p-5 bg-slate-50 pb-24"></div>
    </div>

    <div id="calendar-modal" class="modal-full">
        <div class="bg-slate-800 p-5 text-white flex justify-between items-center shadow-md">
            <button onclick="toggleCalendar()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 id="calendar-month-name" class="font-bold text-xs uppercase tracking-widest">Kalender</h2>
            <div class="flex gap-2">
                <button onclick="changeMonth(-1)" class="p-2"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="changeMonth(1)" class="p-2"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-4 bg-white pb-24">
            <div class="calendar-grid mb-2">
                <div class="calendar-day-head text-red-500">MIN</div><div class="calendar-day-head">SEN</div><div class="calendar-day-head">SEL</div><div class="calendar-day-head">RAB</div><div class="calendar-day-head">KAM</div><div class="calendar-day-head text-teal-600">JUM</div><div class="calendar-day-head">SAB</div>
            </div>
            <div id="calendar-days-grid" class="calendar-grid"></div>
            <div id="holiday-list" class="mt-6 space-y-2 border-t pt-4"></div>
        </div>
    </div>

    <div id="doa-modal" class="modal-full">
        <div class="bg-teal-800 p-5 text-white flex justify-between items-center shadow-md">
            <button onclick="toggleDoa()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-bold text-xs uppercase tracking-widest">Doa Harian</h2>
            <div class="w-10"></div>
        </div>
        <div class="flex-1 text-center p-20 text-slate-400 italic">Fitur Doa Segera Hadir...</div>
    </div>

    <div id="location-sheet-bg" onclick="toggleLocationSheet()" class="fixed inset-0 bg-slate-900/40 z-[250] hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm"></div>
    <div id="location-sheet" class="fixed bottom-0 left-0 right-0 bg-white z-[300] rounded-t-[32px] p-8 translate-y-full transition-transform duration-500 max-w-[500px] mx-auto shadow-2xl">
        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
        <h3 class="text-center text-lg font-bold text-slate-800 mb-6 uppercase">Atur Wilayah</h3>
        <div class="space-y-4">
            <button onclick="getCoreData(); toggleLocationSheet()" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-teal-50 text-teal-700 font-semibold active:scale-95 transition-all"><i class="fa-solid fa-crosshairs text-lg"></i><span>Gunakan Lokasi Otomatis</span></button>
            <div class="relative"><input type="text" id="manual-city-input" placeholder="Nama kota..." class="w-full p-4 pl-12 rounded-2xl bg-slate-50 text-sm border-none focus:ring-2 focus:ring-teal-500 font-medium uppercase tracking-tight"><i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i></div>
            <button onclick="handleManualSearch()" class="w-full p-4 bg-slate-800 text-white rounded-2xl font-bold text-sm">Cari Kota</button>
        </div>
    </div>

    <script>
        let nextPrayerTime = null;
        let currentCalDate = new Date();
        let nationalHolidays = [];
        let currentAudio = null;

        // --- NAVIGATION ---
        window.addEventListener('popstate', function () {
            document.querySelectorAll('.modal-full').forEach(m => m.classList.remove('modal-show'));
            const sheet = document.getElementById('location-sheet');
            const bg = document.getElementById('location-sheet-bg');
            if (sheet && !sheet.classList.contains('translate-y-full')) {
                sheet.classList.add('translate-y-full');
                bg.classList.remove('opacity-100');
                setTimeout(() => bg.classList.add('hidden'), 300);
            }
            if(currentAudio) { currentAudio.pause(); currentAudio = null; }
        });

        function pushState(n) { history.pushState({modal: n}, n, "#"+n); }

        function toggleQuran() {
            const el = document.getElementById('quran-modal');
            if (!el.classList.contains('modal-show')) {
                el.classList.add('modal-show'); loadSurahList(); pushState('quran');
            } else { history.back(); }
        }

        function toggleCalendar() {
            const el = document.getElementById('calendar-modal');
            if (!el.classList.contains('modal-show')) {
                el.classList.add('modal-show'); if (nationalHolidays.length === 0) fetchHolidays();
                renderCalendar(); pushState('calendar');
            } else { history.back(); }
        }

        function toggleDoa() {
            const el = document.getElementById('doa-modal');
            if (!el.classList.contains('modal-show')) { el.classList.add('modal-show'); pushState('doa'); } else { history.back(); }
        }

        function toggleLocationSheet() {
            const sheet = document.getElementById('location-sheet');
            const bg = document.getElementById('location-sheet-bg');
            if (sheet.classList.contains('translate-y-full')) {
                sheet.classList.remove('translate-y-full');
                bg.classList.remove('hidden');
                setTimeout(() => bg.classList.add('opacity-100'), 10);
                pushState('location');
            } else { history.back(); }
        }

        // --- DATES & CALENDAR ---
        function getPasaran(date) {
            const p = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
            const diff = Math.floor((date - new Date(1900, 0, 1)) / 86400000);
            return p[(diff + 1) % 5];
        }

        function getHijri(date) {
            let jd = Math.floor(date.getTime() / 86400000) + 2440588;
            let l = jd - 1948440 + 10632;
            let n = Math.floor((l - 1) / 10631);
            l = l - 10631 * n + 354;
            let j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) + (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
            l = l - (Math.floor((30 - j) / 20)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 30)) * (Math.floor((15238 * j) / 43)) + 29;
            const ms = ["Muharram", "Safar", "Rabiul Awal", "Rabiul Akhir", "Jumadil Ula", "Jumadil Akhira", "Rajab", "Syaban", "Ramadhan", "Syawal", "Dzulqo'dah", "Dzulhijjah"];
            let resMonth = Math.floor((24 * l) / 709);
            let resDay = l - Math.floor((709 * resMonth) / 24);
            return { d: resDay, m: ms[resMonth - 1], y: 30 * n + j - 30 };
        }

        function updateDates() {
            const now = new Date(); const h = getHijri(now);
            const ds = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const ms = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('full-date').innerText = `${ds[now.getDay()]} ${getPasaran(now)}, ${now.getDate()} ${ms[now.getMonth()]} ${now.getFullYear()} M`;
            document.getElementById('java-hijri').innerText = `${h.d} ${h.m} ${h.y} H`;
        }

        async function fetchHolidays() {
            try {
                const res = await fetch(`https://libur.deno.dev/api?year=${currentCalDate.getFullYear()}`);
                nationalHolidays = await res.json(); renderCalendar();
            } catch (e) {}
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-days-grid');
            const holEl = document.getElementById('holiday-list');
            grid.innerHTML = ''; holEl.innerHTML = '';
            const y = currentCalDate.getFullYear(); const m = currentCalDate.getMonth();
            const start = new Date(y, m, 1).getDay(); const total = new Date(y, m + 1, 0).getDate();
            const ms = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('calendar-month-name').innerText = `${ms[m]} ${y}`;

            for (let i = 0; i < start; i++) grid.innerHTML += '<div></div>';
            for (let d = 1; d <= total; d++) {
                const date = new Date(y, m, d); const h = getHijri(date);
                const isHol = nationalHolidays.find(x => x.date === date.toISOString().split('T')[0]);
                const isToday = new Date().toDateString() === date.toDateString();
                grid.innerHTML += `<div class="calendar-date ${isToday ? 'date-today' : ''} ${isHol || date.getDay() === 0 ? 'date-holiday' : ''}"><span class="date-masehi">${d}</span><span class="date-hijri">${h.d}</span><span class="date-pasaran">${getPasaran(date)}</span></div>`;
                if (isHol) holEl.innerHTML += `<div class="flex gap-2 text-[10px] items-start"><span class="font-bold text-red-500">${d}</span><p class="text-slate-600 font-medium">${isHol.name}</p></div>`;
            }
        }

        function changeMonth(v) { currentCalDate.setMonth(currentCalDate.getMonth() + v); renderCalendar(); }

        // --- QURAN API LOGIC (RELIABLE) ---
        async function loadSurahList() {
            const c = document.getElementById('quran-content');
            c.innerHTML = `<div class="text-center py-20 text-slate-400"><i class="fa-solid fa-spinner animate-spin text-3xl mb-4 text-teal-600"></i><p class="text-[10px] font-bold uppercase tracking-widest">Memuat Surah...</p></div>`;
            
            // Mencoba API Utama
            try {
                const r = await fetch('https://equran.id/api/v2/surat');
                const j = await r.json();
                let html = '<div class="grid grid-cols-1 gap-3">';
                j.data.forEach(s => {
                    html += `<div onclick="loadDetailSurah(${s.nomor})" class="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center active:scale-95 transition-all shadow-sm">
                        <div class="flex items-center gap-4">
                            <span class="w-10 h-10 bg-teal-50 text-teal-700 rounded-xl flex items-center justify-center text-xs font-bold">${s.nomor}</span>
                            <div><h4 class="font-bold text-sm text-slate-800 uppercase">${s.namaLatin}</h4><p class="text-[9px] text-slate-400 font-bold uppercase">${s.arti} • ${s.jumlahAyat} Ayat</p></div>
                        </div>
                        <span class="font-arab text-2xl text-teal-600">${s.nama}</span>
                    </div>`;
                });
                c.innerHTML = html + '</div>';
            } catch (e) {
                c.innerHTML = '<p class="text-center p-10 text-red-500">Gagal memuat daftar surah. Periksa internet.</p>';
            }
        }

        async function loadDetailSurah(n) {
            const c = document.getElementById('quran-content');
            c.innerHTML = `<div class="text-center py-20"><i class="fa-solid fa-spinner animate-spin text-3xl text-teal-600"></i><p class="text-xs mt-2">Memuat Ayat...</p></div>`;
            
            const sources = [
                `https://equran.id/api/v2/surat/${n}`,
                `https://quran-api-id.vercel.app/surahs/${n}`
            ];

            for (let url of sources) {
                try {
                    const r = await fetch(url);
                    if (!r.ok) throw new Error();
                    const j = await r.json();
                    const s = j.data || j;
                    const ayahs = s.ayat || s.ayahs;

                    let h = `<div class="bg-teal-700 p-8 rounded-[32px] text-white text-center mb-8 shadow-lg">
                        <h3 class="font-arab text-5xl mb-3">${s.nama || s.arab}</h3>
                        <p class="font-bold text-[10px] uppercase">${s.namaLatin || s.name} • ${s.arti || s.translation}</p>
                    </div><div class="space-y-12">`;
                    
                    ayahs.forEach(a => {
                        const no = a.nomorAyat || a.number.insurah;
                        const arab = a.teksArab || a.arab;
                        const trans = a.teksIndonesia || a.translation;
                        const audio = a.audio['01'] || a.audio.alafasy;

                        h += `<div class="border-b border-slate-100 pb-10">
                            <div class="flex justify-between items-start gap-4 mb-8">
                                <div class="flex flex-col gap-2">
                                    <span class="bg-teal-50 text-teal-600 text-[10px] w-8 h-8 flex items-center justify-center rounded-xl font-bold">${no}</span>
                                    <button onclick="playAudio('${audio}', this)" class="audio-btn"><i class="fa-solid fa-play text-[10px]"></i></button>
                                </div>
                                <p class="font-arab text-4xl text-right leading-[2.8] text-slate-800 w-full" dir="rtl">${arab}</p>
                            </div>
                            <p class="text-sm italic text-slate-500 font-medium border-l-4 border-teal-100 pl-6">${trans}</p>
                        </div>`;
                    });
                    h += `<button onclick="loadSurahList()" class="w-full mt-10 py-5 bg-white text-teal-700 rounded-3xl font-bold text-[10px] uppercase border-2 border-teal-50">Kembali</button>`;
                    c.innerHTML = h + '</div>'; c.scrollTo(0, 0);
                    return; // Sukses, keluar dari loop
                } catch (e) { console.warn("Mencoba API cadangan..."); }
            }
            c.innerHTML = '<p class="text-center p-10 text-red-500 font-bold">Gagal memuat ayat.<br><span class="text-xs font-normal">Silakan coba klik kembali beberapa saat lagi.</span></p>';
        }

        function playAudio(url, btn) {
            if (currentAudio) { currentAudio.pause(); btn.innerHTML = '<i class="fa-solid fa-play text-[10px]"></i>'; if(currentAudio.src === url) { currentAudio = null; return; } }
            currentAudio = new Audio(url); btn.innerHTML = '<i class="fa-solid fa-pause text-[10px]"></i>'; currentAudio.play();
            currentAudio.onended = () => { btn.innerHTML = '<i class="fa-solid fa-play text-[10px]"></i>'; currentAudio = null; };
        }

        // --- PRAYER & LOCATION ---
        async function getCoreData() {
            const cachedLoc = localStorage.getItem('last_location');
            if (cachedLoc) document.getElementById('location-text').innerText = cachedLoc;
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    const lRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18`);
                    const lData = await lRes.json();
                    const addr = lData.address.village || lData.address.suburb || lData.address.city || "Lokasi Aktif";
                    document.getElementById('location-text').innerText = addr;
                    localStorage.setItem('last_location', addr);
                    const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                    const json = await res.json(); setPrayerUI(json.data.timings);
                });
            }
        }

        function setPrayerUI(t) {
            const now = new Date(); const cur = (now.getHours() * 60) + now.getMinutes();
            const s = [{n:'Subuh', t:t.Fajr}, {n:'Dzuhur', t:t.Dhuhr}, {n:'Ashar', t:t.Asr}, {n:'Maghrib', t:t.Maghrib}, {n:'Isya', t:t.Isha}];
            let next = s.find(x => (parseInt(x.t.split(':')[0])*60 + parseInt(x.t.split(':')[1])) > cur) || s[0];
            document.getElementById('prayer-name').innerText = next.n;
            document.getElementById('prayer-time').innerText = next.t;
            const [nH, nM] = next.t.split(':'); nextPrayerTime = new Date(); nextPrayerTime.setHours(nH, nM, 0);
            if (nextPrayerTime < now) nextPrayerTime.setDate(nextPrayerTime.getDate() + 1);
        }

        function startCountdown() {
            setInterval(() => {
                if (!nextPrayerTime) return;
                const diff = nextPrayerTime - new Date(); if (diff <= 0) { getCoreData(); return; }
                const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                document.getElementById('countdown').innerText = `-${h}:${m}:${s}`;
            }, 1000);
        }

        async function handleManualSearch() {
            const city = document.getElementById('manual-city-input').value; if (!city) return;
            document.getElementById('location-text').innerText = "..."; toggleLocationSheet();
            try {
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}&limit=1`);
                const geoData = await geoRes.json();
                if (geoData.length > 0) {
                    const { lat, lon, display_name } = geoData[0];
                    const name = display_name.split(',')[0];
                    document.getElementById('location-text').innerText = name;
                    localStorage.setItem('last_location', name);
                    const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                    const json = await res.json(); setPrayerUI(json.data.timings);
                }
            } catch (e) {}
        }

        updateDates(); getCoreData(); startCountdown();
    </script>
</body>
</html>
