<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    
    <!-- [SECTION: PWA & META] -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/semoljeh/link/main/icon-192.png">

    <!-- [SECTION: RESOURCES] -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* [GROUP: CORE STYLES] */
        *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; margin:0; color: #1e293b; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; background-color: white; min-height: 100vh; position: relative; padding-bottom: 120px; }
        .hidden { display: none; }

        /* [GROUP: HEADER & NAVIGATION] */
        .header-bg { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); height: 220px; border-radius: 0 0 40px 40px; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        .info-capsule { position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%); width: 90%; background: white; border-radius: 30px; padding: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9; z-index: 20; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0 28px 0; border-top: 1px solid #f1f5f9; z-index: 100; }
        .nav-item { color: #0d9488; display: flex; flex-direction: column; align-items: center; cursor: pointer; text-decoration: none; }

        /* [GROUP: MODAL SYSTEM] */
        .modal-full { position: fixed; inset: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }
        .modal-show { transform: translateY(0) !important; }

        /* [GROUP: MODERN CALENDAR GRID] */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 10px; }
        .calendar-day-label { text-align: center; font-size: 10px; font-weight: 800; color: #94a3b8; padding-bottom: 8px; }
        .calendar-box { 
            aspect-ratio: 1/1.2; background: #fff; border: 1px solid #f1f5f9; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            position: relative; transition: 0.2s;
        }
        .calendar-box:active { background: #f0fdfa; transform: scale(0.95); }
        .date-masehi { font-size: 14px; font-weight: 700; color: #1e293b; }
        .date-hijri { font-size: 8px; font-weight: 600; color: #0d9488; margin-top: 2px; }
        .date-weton { font-size: 7px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-top: 1px; }
        
        .is-today { background: #0d9488 !important; border-color: #0d9488; }
        .is-today .date-masehi, .is-today .date-hijri, .is-today .date-weton { color: white !important; }
        .is-holiday, .is-sunday { color: #ef4444 !important; }
        .is-holiday .date-masehi, .is-sunday .date-masehi { color: #ef4444; }

        /* [GROUP: QURAN STYLES] */
        .font-arab { font-family: 'Amiri Quran', serif; }
        .ayah-number { display: inline-flex; justify-content: center; align-items: center; width: 40px; height: 40px; border-radius: 50%; border: 1px solid #99f6e4; color: #0d9488; font-size: 12px; font-weight: 700; margin-right: 10px; vertical-align: middle; background: #f0fdfa; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- HEADER PRAYER INFO -->
        <div class="header-bg">
            <div onclick="App.toggleLocationSheet()" class="location-capsule">
                <i class="fa-solid fa-location-dot text-white text-[10px]"></i>
                <span id="location-text" class="text-[11px] font-semibold text-white">Mencari Lokasi...</span>
            </div>

            <div class="info-capsule">
                <div class="flex items-center justify-between">
                    <div class="flex-1 text-center border-r border-slate-100">
                        <p id="prayer-name" class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">---</p>
                        <h2 id="prayer-time" class="text-4xl font-bold text-slate-800 leading-none">--:--</h2>
                    </div>
                    <div class="flex-1 text-center">
                        <p class="text-[10px] text-red-400 font-bold uppercase tracking-widest mb-1">Mendatang</p>
                        <span id="countdown" class="text-xl font-semibold text-slate-700 font-mono">-00:00:00</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- DASHBOARD MENU -->
        <div class="mt-28 grid grid-cols-2 gap-4 p-6">
            <div class="bg-white border rounded-2xl p-5 text-center"><i class="fa-solid fa-mosque text-teal-600 mb-2"></i><br><span class="text-xs font-bold">PROFIL</span></div>
            <div class="bg-white border rounded-2xl p-5 text-center"><i class="fa-solid fa-book-open text-blue-600 mb-2"></i><br><span class="text-xs font-bold">KEGIATAN</span></div>
        </div>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <a onclick="location.reload()" class="nav-item"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[10px] mt-1">Beranda</span></a>
            <a onclick="App.toggleQuran()" class="nav-item"><i class="fa-solid fa-book-quran text-xl"></i><span class="text-[10px] mt-1">Quran</span></a>
            <a onclick="App.toggleCalendar()" class="nav-item"><i class="fa-solid fa-calendar-days text-xl"></i><span class="text-[10px] mt-1">Kalender</span></a>
            <a onclick="App.toggleDoa()" class="nav-item"><i class="fa-solid fa-hands-praying text-xl"></i><span class="text-[10px] mt-1">Doa</span></a>
        </nav>
    </div>

    <!-- MODAL: CALENDAR -->
    <div id="calendar-modal" class="modal-full">
        <div class="bg-slate-900 p-5 text-white flex justify-between items-center">
            <button onclick="App.toggleCalendar()" class="p-2"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="text-center">
                <h2 id="cal-month-name" class="font-bold text-sm uppercase tracking-widest">---</h2>
                <p id="cal-hijri-range" class="text-[9px] text-teal-400 font-bold"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="Calendar.changeMonth(-1)" class="p-2"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="Calendar.changeMonth(1)" class="p-2"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto p-2 bg-white pb-24">
            <div class="calendar-grid">
                <div class="calendar-day-label is-sunday">MIN</div><div class="calendar-day-label">SEN</div><div class="calendar-day-label">SEL</div>
                <div class="calendar-day-label">RAB</div><div class="calendar-day-label">KAM</div><div class="calendar-day-label text-teal-600">JUM</div><div class="calendar-day-label">SAB</div>
            </div>
            <div id="calendar-main-grid" class="calendar-grid"></div>
            <div id="holiday-info" class="p-5 mt-4 space-y-2 border-t border-slate-50"></div>
        </div>
    </div>

    <!-- MODAL: QURAN -->
    <div id="quran-modal" class="modal-full">
        <div class="bg-teal-700 p-5 text-white flex justify-between items-center">
            <button onclick="App.toggleQuran()" class="p-2"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 id="view-title" class="font-bold text-xs uppercase">Quran Digital</h2>
            <div class="w-10"></div>
        </div>
        <div id="quran-content" class="flex-1 overflow-y-auto p-5 pb-24"></div>
    </div>

    <script>
        /* ============================================================
           [JS GROUP: GLOBAL & SYSTEM]
           ============================================================ */
        const App = {
            pushState(n) { history.pushState({modal: n}, n, "#"+n); },
            toggleCalendar() {
                const el = document.getElementById('calendar-modal');
                if (!el.classList.contains('modal-show')) {
                    el.classList.add('modal-show'); Calendar.init(); this.pushState('calendar');
                } else { history.back(); }
            },
            toggleQuran() {
                const el = document.getElementById('quran-modal');
                if (!el.classList.contains('modal-show')) {
                    el.classList.add('modal-show'); Quran.loadList(); this.pushState('quran');
                } else { history.back(); }
            }
        };

        window.onpopstate = () => { document.querySelectorAll('.modal-full').forEach(m => m.classList.remove('modal-show')); };

        /* ============================================================
           [JS GROUP: CALENDAR, HIJRI, WETON, HOLIDAY]
           ============================================================ */
        const Calendar = {
            curDate: new Date(),
            holidays: [],

            async init() {
                if (this.holidays.length === 0) await this.fetchHolidays();
                this.render();
            },

            async fetchHolidays() {
                try {
                    const res = await fetch(`https://dayoffapi.vercel.app/api?year=${this.curDate.getFullYear()}`);
                    this.holidays = await res.json();
                } catch (e) { console.error("Gagal load libur"); }
            },

            getWeton(date) {
                const wetons = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
                const start = new Date(1900, 0, 1); // Referensi 1 Jan 1900 adalah Senin Pahing
                const diff = Math.floor((date - start) / (1000 * 60 * 60 * 24));
                return wetons[(diff + 1) % 5];
            },

            getHijri(date) {
                // Algoritma Kuwaiti Sederhana
                let jd = Math.floor(date.getTime() / 86400000) + 2440588;
                let l = jd - 1948440 + 10632;
                let n = Math.floor((l - 1) / 10631);
                l = l - 10631 * n + 354;
                let j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) + (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
                l = l - (Math.floor((30 - j) / 20)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 30)) * (Math.floor((15238 * j) / 43)) + 29;
                let m = Math.floor((24 * l) / 709);
                let d = l - Math.floor((709 * m) / 24);
                let y = 30 * n + j - 30;
                const months = ["Muharram","Safar","Rabiul Awal","Rabiul Akhir","Jumadil Ula","Jumadil Akhira","Rajab","Syaban","Ramadhan","Syawal","Dzulqo'dah","Dzulhijjah"];
                return { d, m: months[m-1], y };
            },

            render() {
                const grid = document.getElementById('calendar-main-grid');
                const holList = document.getElementById('holiday-info');
                grid.innerHTML = ''; holList.innerHTML = '';
                
                const y = this.curDate.getFullYear();
                const m = this.curDate.getMonth();
                const firstDay = new Date(y, m, 1).getDay();
                const lastDate = new Date(y, m + 1, 0).getDate();
                const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
                
                document.getElementById('cal-month-name').innerText = `${monthNames[m]} ${y}`;

                // Kosongkan awal grid
                for (let i = 0; i < firstDay; i++) grid.innerHTML += '<div></div>';

                for (let d = 1; d <= lastDate; d++) {
                    const date = new Date(y, m, d);
                    const isToday = date.toDateString() === new Date().toDateString();
                    const isSunday = date.getDay() === 0;
                    const weton = this.getWeton(date);
                    const hijri = this.getHijri(date);
                    const holiday = this.holidays.find(h => h.tanggal === date.toISOString().split('T')[0]);

                    grid.innerHTML += `
                        <div class="calendar-box ${isToday ? 'is-today' : ''} ${holiday || isSunday ? 'is-holiday' : ''}">
                            <span class="date-masehi">${d}</span>
                            <span class="date-hijri">${hijri.d} ${hijri.m.substring(0,3)}</span>
                            <span class="date-weton">${weton}</span>
                        </div>
                    `;

                    if (holiday) {
                        holList.innerHTML += `<div class="flex gap-3 text-[10px] items-start"><span class="bg-red-500 text-white px-2 py-0.5 rounded-full font-bold">${d}</span><p class="font-bold text-slate-700">${holiday.keterangan}</p></div>`;
                    }
                }
            },
            changeMonth(v) { this.curDate.setMonth(this.curDate.getMonth() + v); this.render(); }
        };

        /* ============================================================
           [JS GROUP: PRAYER & QURAN API]
           ============================================================ */
        const Quran = {
            async loadList() {
                const c = document.getElementById('quran-content');
                c.innerHTML = '<p class="text-center">Loading Surah...</p>';
                const res = await fetch('https://api.quran.com/api/v4/chapters?language=id');
                const data = await res.json();
                c.innerHTML = data.chapters.map(s => `<div onclick="Quran.loadAyah(${s.id})" class="p-4 border-b flex justify-between items-center"><div class="text-xs font-bold">${s.id}. ${s.name_simple}</div><div class="font-arab text-teal-600">${s.name_arabic}</div></div>`).join('');
            },
            async loadAyah(id) {
                const c = document.getElementById('quran-content');
                c.innerHTML = '<p class="text-center">Loading Ayat...</p>';
                const res = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${id}`);
                const data = await res.json();
                c.innerHTML = data.verses.map((a, i) => `<div class="py-6 border-b"><p class="font-arab text-3xl text-right leading-[3]">${a.text_uthmani} <span class="ayah-number">${i+1}</span></p></div>`).join('') + `<button onclick="Quran.loadList()" class="w-full p-4 mt-4 bg-slate-100 rounded-xl font-bold text-xs">KEMBALI</button>`;
                c.scrollTo(0,0);
            }
        };

        // Initialize Prayer (Minimal Version)
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const { latitude: lat, longitude: lon } = pos.coords;
            const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
            const data = await res.json();
            const t = data.data.timings;
            document.getElementById('prayer-name').innerText = "DZUHUR";
            document.getElementById('prayer-time').innerText = t.Dhuhr;
            document.getElementById('location-text').innerText = "Lokasi Terdeteksi";
        });
    </script>
</body>
</html>
