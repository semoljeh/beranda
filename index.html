<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        @font-face {
            font-family: 'Uthmanic';
            src: url('https://cdn.jsdelivr.net/gh/ivandotnet/kuran-data/fonts/KFGQPC-Uthman-Taha-Naskh-Standard.ttf');
        }

        body{
            font-family:'Inter',sans-serif;
            background:#f8fafc;
            margin:0;
            display:flex;
            justify-content:center;
        }

        .app-container{
            width:100%;
            max-width:500px;
            min-height:100vh;
            background:white;
            padding-bottom:120px;
        }

        .header-bg{
            background:linear-gradient(135deg,#0d9488 0%,#0f766e 100%);
            height:220px;
            border-radius:0 0 40px 40px;
            display:flex;
            align-items:center;
            justify-content:center;
            color:white;
            font-size:24px;
            font-weight:bold;
        }

        .bottom-nav{
            position:fixed;
            bottom:0;
            width:100%;
            max-width:500px;
            background:white;
            display:flex;
            justify-content:space-around;
            padding:12px 0 28px;
            border-top:1px solid #e2e8f0;
            z-index:100;
        }

        .nav-item{
            display:flex;
            flex-direction:column;
            align-items:center;
            color:#0d9488;
            text-decoration:none;
            cursor:pointer;
        }

        .nav-item i{
            font-size:22px;
            margin-bottom:4px;
        }

        .nav-item span{
            font-size:10px;
            font-weight:700;
        }

        .modal-full{
            position:fixed;
            inset:0;
            background:white;
            z-index:200;
            transform:translateY(100%);
            transition:0.4s;
            display:flex;
            flex-direction:column;
            max-width:500px;
            margin:auto;
        }

        .modal-show{
            transform:translateY(0);
        }

        .arab-block{
            direction:rtl;
            text-align:right;
            line-height:3.2;
        }

        .ayah-text{
            font-family:'Uthmanic',serif;
            font-size:2rem;
            color:#111827;
        }

        .ayah-number-inline{
            font-family:'Uthmanic',serif;
            font-size:.5em;
            color:#0d9488;
            border:1px solid #a7f3d0;
            width:34px;
            height:34px;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            border-radius:50%;
            margin-right:10px;
            vertical-align:middle;
        }

        .latin-block{
            margin-top:16px;
            border-left:3px solid #0d9488;
            padding-left:14px;
        }

        .bismillah-text{
            font-family:'Uthmanic',serif;
            font-size:2.3rem;
            text-align:center;
            color:#0d9488;
            margin:20px 0 30px;
        }

        .hidden{
            display:none;
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="header-bg">
        Portal Darussalam
    </div>

    <div class="p-6">
        <div class="bg-white border rounded-2xl p-6 shadow-sm">
            <h2 class="font-bold text-lg text-slate-700">
                Selamat Datang
            </h2>

            <p class="text-slate-500 mt-2 text-sm">
                Menu Al-Quran sudah terhubung dengan API AlQuran Cloud.
            </p>
        </div>
    </div>

    <!-- FOOTER -->
    <nav class="bottom-nav">

        <a onclick="location.reload()" class="nav-item">
            <i class="fa-solid fa-house"></i>
            <span>Beranda</span>
        </a>

        <a onclick="toggleQuran()" class="nav-item">
            <i class="fa-solid fa-book-quran"></i>
            <span>Quran</span>
        </a>

        <a class="nav-item">
            <i class="fa-solid fa-calendar-days"></i>
            <span>Kalender</span>
        </a>

        <a class="nav-item">
            <i class="fa-solid fa-hands-praying"></i>
            <span>Doa</span>
        </a>

    </nav>

</div>

<!-- MODAL QURAN -->
<div id="quran-modal" class="modal-full">

    <div class="bg-teal-700 p-5 text-white flex justify-between items-center">

        <button onclick="toggleQuran()" class="p-2 bg-white/10 rounded-xl">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div class="text-center">
            <h2 id="surah-title" class="font-bold text-xs uppercase">
                Al-Quran
            </h2>

            <p id="surah-subtitle" class="text-[10px] opacity-70 mt-1"></p>
        </div>

        <button onclick="toggleTranslation()" class="p-2 bg-white/10 rounded-xl">
            <i class="fa-solid fa-language"></i>
        </button>

    </div>

    <div id="quran-content"
         class="flex-1 overflow-y-auto p-4 bg-white pb-24">
    </div>

</div>

<script>

    let isTranslationVisible = true;

    function toggleQuran(){

        const modal = document.getElementById('quran-modal');

        if(modal.classList.contains('modal-show')){
            modal.classList.remove('modal-show');
        }else{
            modal.classList.add('modal-show');
            loadSurahList();
        }
    }

    function toggleTranslation(){

        isTranslationVisible = !isTranslationVisible;

        document.querySelectorAll('.translation-text').forEach(el=>{
            el.classList.toggle('hidden', !isTranslationVisible);
        });
    }

    function toArabicNumber(n){

        const forms = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];

        return String(n)
            .split('')
            .map(c => forms[Number(c)])
            .join('');
    }

    // LOAD LIST SURAH
    async function loadSurahList(){

        const c = document.getElementById('quran-content');

        c.innerHTML = `
        <div class="text-center py-20 text-teal-600 font-bold">
            Memuat Surah...
        </div>`;

        try{

            const r = await fetch('https://api.alquran.cloud/v1/surah');

            const j = await r.json();

            let html = '<div class="space-y-3">';

            j.data.forEach(s=>{

                html += `
                <div onclick="loadDetailSurah(${s.number})"
                     class="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm active:scale-95 transition-all cursor-pointer">

                    <div class="flex items-center gap-4">

                        <span class="w-10 h-10 bg-teal-50 text-teal-700 rounded-xl flex items-center justify-center text-xs font-bold">
                            ${s.number}
                        </span>

                        <div>

                            <h4 class="font-bold text-sm text-slate-700 uppercase">
                                ${s.englishName}
                            </h4>

                            <p class="text-[10px] text-slate-400 font-bold">
                                ${s.revelationType} • ${s.numberOfAyahs} Ayat
                            </p>

                        </div>

                    </div>

                    <span class="ayah-text text-2xl text-teal-600">
                        ${s.name}
                    </span>

                </div>`;
            });

            html += '</div>';

            c.innerHTML = html;

        }catch(e){

            c.innerHTML = `
            <div class="text-center py-20 text-red-500 font-bold">
                Gagal memuat daftar surah
            </div>`;
        }
    }

    // LOAD DETAIL SURAH
    async function loadDetailSurah(n){

        const c = document.getElementById('quran-content');

        c.innerHTML = `
        <div class="text-center py-20 text-teal-600 font-bold">
            Memuat Ayat...
        </div>`;

        try{

            const r = await fetch(
                `https://api.alquran.cloud/v1/surah/${n}/editions/quran-uthmani,id.indonesian`
            );

            const j = await r.json();

            const arab = j.data[0];
            const indo = j.data[1];

            document.getElementById('surah-title').innerText =
                arab.englishName;

            document.getElementById('surah-subtitle').innerText =
                `${arab.revelationType} • ${arab.numberOfAyahs} Ayat`;

            let html = '';

            if(n != 1 && n != 9){

                html += `
                <div class="bismillah-text">
                    بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ
                </div>`;
            }

            arab.ayahs.forEach((a,i)=>{

                html += `
                <div class="p-6 bg-white border-b border-slate-50">

                    <div class="arab-block">

                        <span class="ayah-text">

                            ${a.text}

                            <span class="ayah-number-inline">
                                ${toArabicNumber(i+1)}
                            </span>

                        </span>

                    </div>

                    <div class="latin-block translation-text ${isTranslationVisible ? '' : 'hidden'}">

                        <p class="text-sm text-slate-500 leading-relaxed">
                            ${indo.ayahs[i].text}
                        </p>

                    </div>

                </div>`;
            });

            html += `
            <button onclick="loadSurahList()"
                    class="w-full mt-6 py-5 bg-teal-50 text-teal-700 rounded-3xl font-bold text-[10px] uppercase">
                Kembali
            </button>`;

            c.innerHTML = html;

            c.scrollTo(0,0);

        }catch(e){

            c.innerHTML = `
            <div class="text-center py-20 text-red-500 font-bold">
                Gagal memuat ayat
            </div>`;
        }
    }

</script>

</body>
</html>
