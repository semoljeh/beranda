<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>

    <!-- =============================================
         1. CORE SETUP & GLOBAL STYLE
         Konfigurasi dasar untuk seluruh aplikasi
         ============================================= -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        @font-face { font-family: 'LPMQ'; src: url('https://kemenag.go.id/assets/fonts/lpmq.ttf'); }
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; margin:0; color: #1e293b; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; background-color: white; min-height: 100vh; position: relative; padding-bottom: 120px; }
        
        /* Global Modal Backdrop & Animation */
        .modal-full { position: fixed; inset: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }
        .modal-show { transform: translateY(0) !important; }
    </style>

    <script>
        // Global Navigation (Handing HP Back Button)
        window.addEventListener('popstate', function () {
            document.querySelectorAll('.modal-full').forEach(m => m.classList.remove('modal-show'));
            const sheet = document.getElementById('location-sheet');
            const bg = document.getElementById('location-sheet-bg');
            if (sheet && !sheet.classList.contains('translate-y-full')) {
                sheet.classList.add('translate-y-full');
                bg.classList.remove('opacity-100');
                setTimeout(() => bg.classList.add('hidden'), 300);
            }
            if(typeof stopAudio === "function") stopAudio();
        });
        function pushState(n) { history.pushState({modal: n}, n, "#"+n); }
    </script>
</head>
<body>
    <div class="app-container">

        <!-- =============================================
             2. MODULE: HEADER & PRAYER TIMES
             Semua yang berhubungan dengan Jadwal Sholat & Lokasi
             ============================================= -->
        <section id="module-header">
            <style>
                .header-bg { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); height: 220px; border-radius: 0 0 40px 40px; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
                .location-capsule { display: flex; align-items: center; gap: 6px; background-color: rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; backdrop-filter: blur(4px); }
                .info-capsule { position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%); width: 90%; background: white; border-radius: 30px; padding: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; z-index: 20; }
            </style>

            <div class="header-bg">
                <div onclick="toggleLocationSheet()" class="location-capsule">
                    <i class="fa-solid fa-location-dot text-white text-[10px]"></i>
                    <span id="location-text" class="text-[11px] font-semibold text-white truncate max-w-[150px]">Mencari Lokasi...</span>
                    <i class="fa-solid fa-chevron-down text-white/50 text-[9px]"></i>
                </div>
                <div class="info-capsule">
                    <div class="flex items-center justify-between">
                        <div class="flex-1 text-center border-r border-slate-100">
                            <p id="prayer-name" class="text-[10px] text-slate-400 font-bold uppercase mb-1">---</p>
                            <h2 id="prayer-time" class="text-4xl font-bold text-slate-800 tracking-tight leading-none">--:--</h2>
                        </div>
                        <div class="flex-1 text-center">
                            <p class="text-[10px] text-red-400 font-bold uppercase mb-1">Mendatang</p>
                            <span id="countdown" class="text-xl font-semibold text-slate-700 font-mono">-00:00:00</span>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-50 text-center">
                        <p id="full-date" class="text-[11px] font-medium text-slate-500 mb-1"></p>
                        <p id="java-hijri" class="text-xs text-teal-600 font-semibold tracking-tight"></p>
                    </div>
                </div>
            </div>

            <script>
                let nextPrayerTime = null;
                async function getCoreData() {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(async (pos) => {
                            const { latitude: lat, longitude: lon } = pos.coords;
                            const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                            const json = await res.json(); 
                            setPrayerUI(json.data.timings);
                        });
                    }
                }
                function setPrayerUI(t) {
                    const now = new Date(); const cur = (now.getHours() * 60) + now.getMinutes();
                    const s = [{n:'Subuh', t:t.Fajr}, {n:'Dzuhur', t:t.Dhuhr}, {n:'Ashar', t:t.Asr}, {n:'Maghrib', t:t.Maghrib}, {n:'Isya', t:t.Isha}];
                    let next = s.find(x => (parseInt(x.t.split(':')[0])*60 + parseInt(x.t.split(':')[1])) > cur) || s[0];
                    document.getElementById('prayer-name').innerText = next.n;
                    document.getElementById('prayer-time').innerText = next.t;
                    const [nH, nM] = next.t.split(':'); nextPrayerTime = new Date(); nextPrayerTime.setHours(nH, nM, 0);
                    if (nextPrayerTime < now) nextPrayerTime.setDate(nextPrayerTime.getDate() + 1);
                }
                function startCountdown() {
                    setInterval(() => {
                        if (!nextPrayerTime) return;
                        const diff = nextPrayerTime - new Date(); 
                        if (diff <= 0) { getCoreData(); return; }
                        const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                        const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                        document.getElementById('countdown').innerText = `-${h}:${m}:${s}`;
                    }, 1000);
                }
            </script>
        </section>


        <!-- =============================================
             3. MODULE: MAIN NAVIGATION MENU
             Pilihan menu utama di halaman depan
             ============================================= -->
        <section id="module-menu">
            <style>
                .menu-card { background: #ffffff; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; border: 1px solid #f1f5f9; transition: transform 0.2s; }
                .menu-card:active { transform: scale(0.96); background-color: #f8fafc; }
            </style>
            <div class="mt-24 text-center px-8">
                <h1 class="text-xl font-bold text-slate-800">Portal Darussalam</h1>
                <p class="text-xs text-slate-400">Digital Madrasah Ecosystem</p>
            </div>
            <div class="grid grid-cols-2 gap-4 p-6">
                <div class="menu-card"><div class="w-12 h-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-mosque"></i></div><span class="text-xs font-semibold uppercase">Profil</span></div>
                <div class="menu-card"><div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-book-open"></i></div><span class="text-xs font-semibold uppercase">Kegiatan</span></div>
                <div class="menu-card"><div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-file-signature"></i></div><span class="text-xs font-semibold uppercase">Daftar</span></div>
                <div class="menu-card"><div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-heart-pulse"></i></div><span class="text-xs font-semibold uppercase">Donasi</span></div>
            </div>
        </section>


        <!-- =============================================
             4. MODULE: AL-QURAN PRO
             Sistem baca Quran, Audio, dan Terjemahan
             ============================================= -->
        <section id="module-quran">
            <style>
                .font-arab { font-family: 'LPMQ', serif; }
                .audio-playing { background-color: #f0fdf4; border-radius: 16px; }
                .audio-btn { width: 32px; height: 32px; border-radius: 50%; background: #f0fdf4; color: #0d9488; display: flex; align-items: center; justify-content: center; }
            </style>

            <div id="quran-modal" class="modal-full">
                <div class="bg-teal-700 p-5 text-white flex justify-between items-center shadow-md">
                    <button onclick="toggleQuran()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
                    <h2 id="surah-title" class="font-bold text-xs uppercase">Al-Quran Pro</h2>
                    <button id="btn-trans" onclick="toggleTranslation()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-language"></i></button>
                </div>
                <div id="quran-content" class="flex-1 overflow-y-auto p-5 bg-slate-50 pb-24"></div>
            </div>

            <script>
                let currentAudio = null;
                let ayahList = [];
                let isTrans = true;

                function toggleQuran() {
                    const el = document.getElementById('quran-modal');
                    if (!el.classList.contains('modal-show')) {
                        el.classList.add('modal-show'); loadSurahList(); pushState('quran');
                    } else { history.back(); }
                }

                function toggleTranslation() {
                    isTrans = !isTrans;
                    document.querySelectorAll('.translation-text').forEach(el => isTrans ? el.classList.remove('hidden') : el.classList.add('hidden'));
                }

                async function loadSurahList() {
                    const c = document.getElementById('quran-content');
                    c.innerHTML = `<div class="text-center py-20 animate-pulse text-teal-600">Memuat Surah...</div>`;
                    const r = await fetch('https://equran.id/api/v2/surat');
                    const j = await r.json();
                    let html = '<div class="grid grid-cols-1 gap-3">';
                    j.data.forEach(s => {
                        html += `<div onclick="loadDetailSurah(${s.nomor})" class="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center">
                            <div class="flex items-center gap-4">
                                <span class="w-10 h-10 bg-teal-50 text-teal-700 rounded-xl flex items-center justify-center text-xs font-bold">${s.nomor}</span>
                                <div><h4 class="font-bold text-sm uppercase">${s.namaLatin}</h4><p class="text-[9px] text-slate-400 font-bold uppercase">${s.arti}</p></div>
                            </div>
                            <span class="font-arab text-2xl text-teal-600">${s.nama}</span>
                        </div>`;
                    });
                    c.innerHTML = html + '</div>';
                }

                async function loadDetailSurah(n) {
                    const c = document.getElementById('quran-content');
                    const r = await fetch(`https://equran.id/api/v2/surat/${n}`);
                    const j = await r.json();
                    const s = j.data; ayahList = s.ayat;
                    document.getElementById('surah-title').innerText = s.namaLatin;
                    let html = `<div class="bg-teal-700 p-8 rounded-[32px] text-white text-center mb-8 shadow-lg"><h3 class="font-arab text-5xl mb-3">${s.nama}</h3></div>`;
                    ayahList.forEach((a, i) => {
                        html += `<div id="ayah-box-${i}" class="p-5 border-b border-slate-100">
                            <p class="font-arab text-4xl leading-[2.8] text-right" dir="rtl">${a.teksArab}</p>
                            <div class="flex items-center gap-4 mt-4">
                                <button onclick="playAudio(${i})" id="audio-btn-${i}" class="audio-btn"><i class="fa-solid fa-play text-[10px]"></i></button>
                                <p class="translation-text text-sm italic text-slate-500 border-l-4 border-teal-100 pl-4">${a.teksIndonesia}</p>
                            </div>
                        </div>`;
                    });
                    c.innerHTML = html; c.scrollTo(0,0);
                }

                function playAudio(i) {
                    if (currentAudio) stopAudio();
                    currentAudio = new Audio(ayahList[i].audio['01']);
                    document.getElementById(`audio-btn-${i}`).innerHTML = '<i class="fa-solid fa-pause text-[10px]"></i>';
                    document.getElementById(`ayah-box-${i}`).classList.add('audio-playing');
                    currentAudio.play();
                }

                function stopAudio() {
                    if (currentAudio) {
                        currentAudio.pause();
                        document.querySelectorAll('.audio-btn').forEach(b => b.innerHTML = '<i class="fa-solid fa-play text-[10px]"></i>');
                        document.querySelectorAll('.audio-playing').forEach(b => b.classList.remove('audio-playing'));
                    }
                    currentAudio = null;
                }
            </script>
        </section>


        <!-- =============================================
             5. MODULE: SMART CALENDAR & PASARAN
             Kalender interaktif dengan sistem penanggalan
             ============================================= -->
        <section id="module-calendar">
            <style>
                .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
                .calendar-date { aspect-ratio: 1/1.3; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid #f8fafc; }
                .date-today { background: #0d9488; color: white !important; }
                .date-holiday { color: #ef4444; }
            </style>

            <div id="calendar-modal" class="modal-full">
                <div class="bg-slate-800 p-5 text-white flex justify-between items-center shadow-md">
                    <button onclick="toggleCalendar()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
                    <h2 id="calendar-month-name" class="font-bold text-xs uppercase tracking-widest">Kalender</h2>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="p-2"><i class="fa-solid fa-chevron-left"></i></button>
                        <button onclick="changeMonth(1)" class="p-2"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto p-4 bg-white pb-24">
                    <div id="calendar-days-grid" class="calendar-grid"></div>
                </div>
            </div>

            <script>
                let curDate = new Date();
                function toggleCalendar() {
                    const el = document.getElementById('calendar-modal');
                    if (!el.classList.contains('modal-show')) {
                        el.classList.add('modal-show'); renderCalendar(); pushState('calendar');
                    } else { history.back(); }
                }
                function renderCalendar() {
                    const grid = document.getElementById('calendar-days-grid');
                    grid.innerHTML = '';
                    const y = curDate.getFullYear(); const m = curDate.getMonth();
                    document.getElementById('calendar-month-name').innerText = `${y} - ${m+1}`;
                    const total = new Date(y, m + 1, 0).getDate();
                    for (let d = 1; d <= total; d++) {
                        grid.innerHTML += `<div class="calendar-date"><span class="text-sm font-bold">${d}</span></div>`;
                    }
                }
                function changeMonth(v) { curDate.setMonth(curDate.getMonth() + v); renderCalendar(); }
            </script>
        </section>


        <!-- =============================================
             6. MODULE: BOTTOM NAVIGATION BAR
             Navigasi statis di bagian bawah layar
             ============================================= -->
        <nav class="bottom-nav fixed bottom-0 left-0 right-0 max-w-[500px] mx-auto bg-white border-t p-4 flex justify-around z-[100]">
            <style>
                .nav-item { color: #0d9488; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
            </style>
            <div onclick="location.reload()" class="nav-item"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[10px] mt-1">Beranda</span></div>
            <div onclick="toggleQuran()" class="nav-item"><i class="fa-solid fa-book-quran text-xl"></i><span class="text-[10px] mt-1">Quran</span></div>
            <div onclick="toggleCalendar()" class="nav-item"><i class="fa-solid fa-calendar-days text-xl"></i><span class="text-[10px] mt-1">Kalender</span></div>
        </nav>

        <!-- Location Bottom Sheet -->
        <div id="location-sheet-bg" onclick="toggleLocationSheet()" class="fixed inset-0 bg-black/40 z-[250] hidden opacity-0 transition-opacity backdrop-blur-sm"></div>
        <div id="location-sheet" class="fixed bottom-0 left-0 right-0 bg-white z-[300] rounded-t-[32px] p-8 translate-y-full transition-transform max-w-[500px] mx-auto">
            <button onclick="getCoreData(); toggleLocationSheet()" class="w-full p-4 bg-teal-600 text-white rounded-2xl font-bold">Aktifkan GPS</button>
        </div>

        <script>
            function toggleLocationSheet() {
                const sheet = document.getElementById('location-sheet');
                const bg = document.getElementById('location-sheet-bg');
                if (sheet.classList.contains('translate-y-full')) {
                    sheet.classList.remove('translate-y-full');
                    bg.classList.remove('hidden');
                    setTimeout(() => bg.classList.add('opacity-100'), 10);
                    pushState('location');
                } else { history.back(); }
            }
        </script>
    </div>

    <!-- =============================================
         7. SYSTEM INITIALIZATION
         Menjalankan mesin utama aplikasi
         ============================================= -->
    <script>
        window.onload = () => {
            getCoreData();
            startCountdown();
            // Update Tampilan Tanggal Awal
            const now = new Date();
            document.getElementById('full-date').innerText = now.toDateString();
        };
    </script>
</body>
</html>
