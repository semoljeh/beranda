<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    
    <!-- =============================================
         KLP 1: CORE SETUP (Meta, Libs, Global CSS)
         ============================================= -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Darussalam">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/semoljeh/link/main/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        @font-face { font-family: 'LPMQ'; src: url('https://kemenag.go.id/assets/fonts/lpmq.ttf'); }
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; margin:0; color: #1e293b; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; background-color: white; min-height: 100vh; position: relative; padding-bottom: 120px; }
        
        /* Global Modal Backdrop */
        .modal-full { position: fixed; inset: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }
        .modal-show { transform: translateY(0) !important; }
    </style>

    <script>
        // Global State & Navigation
        window.addEventListener('popstate', function () {
            document.querySelectorAll('.modal-full').forEach(m => m.classList.remove('modal-show'));
            const sheet = document.getElementById('location-sheet');
            const bg = document.getElementById('location-sheet-bg');
            if (sheet && !sheet.classList.contains('translate-y-full')) {
                sheet.classList.add('translate-y-full');
                bg.classList.remove('opacity-100');
                setTimeout(() => bg.classList.add('hidden'), 300);
            }
            if(typeof stopAudio === "function") stopAudio();
        });
        function pushState(n) { history.pushState({modal: n}, n, "#"+n); }
    </script>
</head>
<body>

    <div class="app-container">

        <!-- =============================================
             KLP 2: HEADER & PRAYER ENGINE
             ============================================= -->
        <section id="module-header">
            <style>
                .header-bg { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); height: 220px; border-radius: 0 0 40px 40px; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
                .location-capsule { display: flex; align-items: center; gap: 6px; background-color: rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; backdrop-filter: blur(4px); transition: transform 0.2s; }
                .info-capsule { position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%); width: 90%; background: white; border-radius: 30px; padding: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; z-index: 20; }
            </style>

            <div class="header-bg">
                <div onclick="toggleLocationSheet()" class="location-capsule">
                    <i class="fa-solid fa-location-dot text-white text-[10px]"></i>
                    <span id="location-text" class="text-[11px] font-semibold text-white truncate max-w-[150px]">Mencari Lokasi...</span>
                    <i class="fa-solid fa-chevron-down text-white/50 text-[9px]"></i>
                </div>
                <div class="info-capsule">
                    <div class="flex items-center justify-between">
                        <div class="flex-1 text-center border-r border-slate-100">
                            <p id="prayer-name" class="text-[10px] text-slate-400 font-bold uppercase mb-1">---</p>
                            <h2 id="prayer-time" class="text-4xl font-bold text-slate-800 tracking-tight leading-none">--:--</h2>
                        </div>
                        <div class="flex-1 text-center">
                            <p class="text-[10px] text-red-400 font-bold uppercase mb-1">Mendatang</p>
                            <span id="countdown" class="text-xl font-semibold text-slate-700 font-mono tracking-tighter">-00:00:00</span>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-50 text-center">
                        <p id="full-date" class="text-[11px] font-medium text-slate-500 mb-1"></p>
                        <p id="java-hijri" class="text-xs text-teal-600 font-semibold tracking-tight"></p>
                    </div>
                </div>
            </div>

            <script>
                let nextPrayerTime = null;
                async function getCoreData() {
                    const cachedLoc = localStorage.getItem('last_location');
                    if (cachedLoc) document.getElementById('location-text').innerText = cachedLoc;
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(async (pos) => {
                            const { latitude: lat, longitude: lon } = pos.coords;
                            const lRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18`);
                            const lData = await lRes.json();
                            const addr = lData.address.village || lData.address.suburb || lData.address.city || "Lokasi Aktif";
                            document.getElementById('location-text').innerText = addr;
                            localStorage.setItem('last_location', addr);
                            const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                            const json = await res.json(); 
                            setPrayerUI(json.data.timings);
                        });
                    }
                }
                function setPrayerUI(t) {
                    const now = new Date(); const cur = (now.getHours() * 60) + now.getMinutes();
                    const s = [{n:'Subuh', t:t.Fajr}, {n:'Dzuhur', t:t.Dhuhr}, {n:'Ashar', t:t.Asr}, {n:'Maghrib', t:t.Maghrib}, {n:'Isya', t:t.Isha}];
                    let next = s.find(x => (parseInt(x.t.split(':')[0])*60 + parseInt(x.t.split(':')[1])) > cur) || s[0];
                    document.getElementById('prayer-name').innerText = next.n;
                    document.getElementById('prayer-time').innerText = next.t;
                    const [nH, nM] = next.t.split(':'); nextPrayerTime = new Date(); nextPrayerTime.setHours(nH, nM, 0);
                    if (nextPrayerTime < now) nextPrayerTime.setDate(nextPrayerTime.getDate() + 1);
                }
                function startCountdown() {
                    setInterval(() => {
                        if (!nextPrayerTime) return;
                        const diff = nextPrayerTime - new Date(); 
                        if (diff <= 0) { getCoreData(); return; }
                        const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                        const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                        document.getElementById('countdown').innerText = `-${h}:${m}:${s}`;
                    }, 1000);
                }
            </script>
        </section>

        <!-- =============================================
             KLP 3: MENU GRID
             ============================================= -->
        <section id="module-menu">
            <style>
                .menu-card { background: #ffffff; border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; border: 1px solid #f1f5f9; transition: transform 0.2s ease; }
                .menu-card:active { transform: scale(0.96); background-color: #f8fafc; }
            </style>
            <div class="mt-24 text-center px-8">
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">Portal Darussalam</h1>
                <p class="text-xs text-slate-400 font-medium">Digital Madrasah Ecosystem</p>
            </div>
            <div class="grid grid-cols-2 gap-4 p-6">
                <div class="menu-card"><div class="w-12 h-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-mosque"></i></div><span class="text-xs font-semibold uppercase">Profil</span></div>
                <div class="menu-card"><div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-book-open"></i></div><span class="text-xs font-semibold uppercase">Kegiatan</span></div>
                <div class="menu-card"><div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-file-signature"></i></div><span class="text-xs font-semibold uppercase">Daftar</span></div>
                <div class="menu-card"><div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center text-xl mb-3"><i class="fa-solid fa-heart-pulse"></i></div><span class="text-xs font-semibold uppercase">Donasi</span></div>
            </div>
        </section>

        <!-- =============================================
             KLP 4: MODUL AL-QURAN (API QURAN.COM)
             ============================================= -->
<section id="module-quran">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&display=swap');

        .font-arab { 
            font-family: 'Amiri', serif; 
            font-weight: 400;
            line-height: 2.2;
            direction: rtl;
        }

        .quran-tab-container {
            display: flex; background: rgba(255,255,255,0.1);
            border-radius: 12px; padding: 4px; margin-top: 10px;
        }
        .quran-tab {
            flex: 1; text-align: center; padding: 8px; font-size: 10px;
            font-weight: 800; text-transform: uppercase; color: white;
            cursor: pointer; border-radius: 8px; transition: 0.3s;
        }
        .quran-tab.active { background: white; color: #0f766e; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }

        .ayah-end-number {
            font-family: 'Amiri', serif; font-size: 1.5rem; color: #0d9488;
            margin-left: 8px; display: inline-block; vertical-align: middle;
        }

        .murottal-control-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: #0d9488; color: white; padding: 10px 24px; border-radius: 100px;
            font-size: 11px; font-weight: 700; text-transform: uppercase; margin: 0 auto 20px auto;
            box-shadow: 0 4px 15px rgba(13, 148, 136, 0.25); border: none; cursor: pointer;
        }
        .murottal-control-btn.playing { background: #ef4444; }

        .surah-badge {
            font-size: 8px; border: 1px solid rgba(255,255,255,0.4);
            padding: 2px 8px; border-radius: 50px; text-transform: uppercase; font-weight: 800;
        }
    </style>

    <div id="quran-modal" class="modal-full">
        <div class="bg-teal-700 p-5 text-white shadow-md">
            <div class="flex justify-between items-center">
                <button onclick="toggleQuran()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
                <div class="text-center flex-1 mx-2">
                    <h2 id="surah-title-arab" class="font-arab text-2xl leading-none mb-1 text-white"></h2>
                    <p class="text-[10px] font-bold uppercase tracking-widest flex items-center justify-center gap-1">
                        <span id="surah-title-latin">AL-QURAN PRO</span>
                        <span id="surah-subtitle" class="opacity-70 font-medium normal-case text-[9px]"></span>
                    </p>
                </div>
                <button onclick="toggleTranslation()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-language"></i></button>
            </div>

            <div id="quran-tabs" class="quran-tab-container">
                <div id="tab-surah" onclick="switchQuranTab('surah')" class="quran-tab active">Surah</div>
                <div id="tab-juz" onclick="switchQuranTab('juz')" class="quran-tab">Juz</div>
            </div>

            <div id="surah-meta-info" class="flex justify-center gap-2 mt-3 hidden">
                <span id="surah-info-count" class="surah-badge"></span>
                <span id="surah-info-type" class="surah-badge"></span>
            </div>
        </div>
        
        <div id="quran-content" class="flex-1 overflow-y-auto p-5 bg-slate-50 pb-24"></div>
    </div>

    <script>
        const QuranAPI = {
            baseUrl: 'https://api.quran.com/api/v4',
            async getChapters() { return fetch(`${this.baseUrl}/chapters?language=id`).then(r => r.json()); },
            async getJuzs() { return fetch(`${this.baseUrl}/juzs`).then(r => r.json()); },
            async getVersesByChapter(id) { return fetch(`${this.baseUrl}/quran/verses/uthmani?chapter_number=${id}`).then(r => r.json()); },
            async getVersesByJuz(id) { return fetch(`${this.baseUrl}/quran/verses/uthmani?juz_number=${id}`).then(r => r.json()); },
            async getTranslationByChapter(id) { return fetch(`${this.baseUrl}/quran/translations/33?chapter_number=${id}`).then(r => r.json()); },
            async getTranslationByJuz(id) { return fetch(`${this.baseUrl}/quran/translations/33?juz_number=${id}`).then(r => r.json()); },
            async getAudio(id) { return fetch(`${this.baseUrl}/chapter_recitations/7/${id}`).then(r => r.json()); }
        };

        const juzNamesArab = ["", "الجزء الأول", "الجزء الثاني", "الجزء الثالث", "الجزء الرابع", "الجزء الخامس", "الجزء السادس", "الجزء السابع", "الجزء الثامن", "الجزء التاسع", "الجزء العاشر", "الجزء الحادي عشر", "الجزء الثاني عشر", "الجزء الثالث عشر", "الجزء الرابع عشر", "الجزء الخامس عشر", "الجزء السادس عشر", "الجزء السابع عشر", "الجزء الثامن عشر", "الجزء التاسع عشر", "الجزء العشرون", "الجزء الحادي والعشرون", "الجزء الثاني والعشرون", "الجزء الثالث والعشرون", "الجزء الرابع والعشرون", "الجزء الخامس والعشرون", "الجزء السادس والعشرون", "الجزء السابع والعشرون", "الجزء الثامن والعشرون", "الجزء التاسع والعشرون", "الجزء الثلاثون"];

        let currentAudio = null;
        let isTranslationVisible = true;
        let currentAudioUrl = "";

        function toArabicNumber(n) {
            const forms = ['\u0660', '\u0661', '\u0662', '\u0663', '\u0664', '\u0665', '\u0666', '\u0667', '\u0668', '\u0669'];
            return String(n).split('').map(c => forms[Number(c)]).join('');
        }

        function toggleQuran() {
            const el = document.getElementById('quran-modal');
            if (!el.classList.contains('modal-show')) {
                el.classList.add('modal-show'); switchQuranTab('surah');
                if(typeof pushState === 'function') pushState('quran');
            } else { stopAudio(); history.back(); }
        }

        function switchQuranTab(tab) {
            document.getElementById('tab-surah').classList.toggle('active', tab === 'surah');
            document.getElementById('tab-juz').classList.toggle('active', tab === 'juz');
            tab === 'surah' ? loadSurahList() : loadJuzList();
        }

        function toggleTranslation() {
            isTranslationVisible = !isTranslationVisible;
            document.querySelectorAll('.translation-text').forEach(el => {
                isTranslationVisible ? el.classList.remove('hidden') : el.classList.add('hidden');
            });
        }

        async function loadSurahList() {
            const c = document.getElementById('quran-content');
            c.innerHTML = `<div class="text-center py-20 text-teal-600 animate-pulse font-bold">Memuat Surah...</div>`;
            document.getElementById('quran-tabs').classList.remove('hidden');
            document.getElementById('surah-meta-info').classList.add('hidden');
            document.getElementById('surah-title-arab').innerText = "";
            document.getElementById('surah-title-latin').innerText = "AL-QURAN PRO";
            document.getElementById('surah-subtitle').innerText = "";

            try {
                const data = await QuranAPI.getChapters();
                let html = '<div class="grid grid-cols-1 gap-3">';
                data.chapters.forEach(s => {
                    html += `<div onclick="loadDetailQuran(${s.id}, 'surah', '${s.name_simple.replace(/'/g, "")}', '${s.translated_name.name}')" class="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center active:scale-95 transition-all shadow-sm">
                        <div class="flex items-center gap-4">
                            <span class="w-10 h-10 bg-teal-50 text-teal-700 rounded-xl flex items-center justify-center text-xs font-bold">${s.id}</span>
                            <div><h4 class="font-bold text-sm uppercase">${s.name_simple}</h4><p class="text-[9px] text-slate-400 font-bold uppercase">${s.translated_name.name}</p></div>
                        </div>
                        <span class="font-arab text-3xl text-teal-600">${s.name_arabic}</span>
                    </div>`;
                });
                c.innerHTML = html + '</div>';
            } catch (e) { c.innerHTML = '<p class="text-center p-10">Gagal memuat.</p>'; }
        }

        async function loadJuzList() {
            const c = document.getElementById('quran-content');
            c.innerHTML = `<div class="text-center py-20 text-teal-600 animate-pulse font-bold">Memuat Juz...</div>`;
            try {
                const data = await QuranAPI.getJuzs();
                let html = '<div class="grid grid-cols-1 gap-3">';
                // Memastikan tidak ada duplikasi dengan Set atau filter unik
                const uniqueJuzs = data.juzs.filter((v,i,a)=>a.findIndex(t=>(t.juz_number === v.juz_number))===i);
                
                uniqueJuzs.forEach(j => {
                    const firstChapter = Object.keys(j.verse_mapping)[0];
                    html += `<div onclick="loadDetailQuran(${j.juz_number}, 'juz')" class="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center active:scale-95 transition-all shadow-sm">
                        <div class="flex items-center gap-4">
                            <span class="w-10 h-10 bg-teal-50 text-teal-700 rounded-xl flex items-center justify-center text-xs font-bold">${j.juz_number}</span>
                            <div><h4 class="font-bold text-sm uppercase">Juz ${j.juz_number}</h4><p class="text-[9px] text-slate-400 font-bold uppercase">Mulai Surah: ${firstChapter}</p></div>
                        </div>
                        <span class="font-arab text-xl text-teal-600">${juzNamesArab[j.juz_number]}</span>
                    </div>`;
                });
                c.innerHTML = html + '</div>';
            } catch (e) { c.innerHTML = '<p class="text-center p-10">Gagal memuat Juz.</p>'; }
        }

        async function loadDetailQuran(id, type, name = "", arti = "") {
            const c = document.getElementById('quran-content');
            c.innerHTML = `<div class="text-center py-20 animate-spin text-3xl text-teal-600"><i class="fa-solid fa-circle-notch"></i></div>`;
            document.getElementById('quran-tabs').classList.add('hidden');
            
            try {
                let arab, indo, audioData = null;
                if(type === 'surah') {
                    const [info, vArab, vIndo, vAudio] = await Promise.all([
                        fetch(`https://api.quran.com/api/v4/chapters/${id}?language=id`).then(r => r.json()),
                        QuranAPI.getVersesByChapter(id), QuranAPI.getTranslationByChapter(id), QuranAPI.getAudio(id)
                    ]);
                    document.getElementById('surah-title-arab').innerText = `\uFD3F ${info.chapter.name_arabic} \uFD3E`;
                    document.getElementById('surah-title-latin').innerText = name;
                    document.getElementById('surah-subtitle').innerText = `(${arti})`;
                    document.getElementById('surah-info-count').innerText = `${info.chapter.verses_count} Ayat`;
                    document.getElementById('surah-info-type').innerText = info.chapter.revelation_place;
                    document.getElementById('surah-meta-info').classList.remove('hidden');
                    arab = vArab.verses; indo = vIndo.translations; audioData = vAudio;
                } else {
                    const [vArab, vIndo] = await Promise.all([
                        QuranAPI.getVersesByJuz(id), QuranAPI.getTranslationByJuz(id)
                    ]);
                    document.getElementById('surah-title-arab').innerText = `\uFD3F ${juzNamesArab[id]} \uFD3E`;
                    document.getElementById('surah-title-latin').innerText = `Juz ${id}`;
                    document.getElementById('surah-subtitle').innerText = "";
                    document.getElementById('surah-meta-info').classList.add('hidden');
                    arab = vArab.verses; indo = vIndo.translations;
                }

                let html = "";
                if(type === 'surah' && audioData) {
                    currentAudioUrl = audioData.audio_file.audio_url.startsWith('http') ? audioData.audio_file.audio_url : `https:${audioData.audio_file.audio_url}`;
                    html += `<div class="text-center py-4"><button id="murottal-btn" onclick="handleMurottal()" class="murottal-control-btn"><i class="fa-solid fa-play"></i> <span>Putar Murottal</span></button></div>`;
                }

                arab.forEach((a, i) => {
                    // FIX: Ambil nomor ayat asli dari verse_key (misal 78:1 -> ambil 1)
                    const ayahNum = a.verse_key ? a.verse_key.split(':')[1] : (i + 1);
                    const translation = (indo[i]) ? indo[i].text.replace(/<(?:.|\n)*?>/gm, '') : '...';
                    const hiddenClass = isTranslationVisible ? '' : 'hidden';

                    html += `
                    <div class="p-6 border-b border-slate-100 bg-white mb-3 rounded-2xl shadow-sm">
                        <div class="w-full text-right" dir="rtl">
                            <span class="font-arab text-4xl text-slate-800">${a.text_uthmani}</span>
                            <span class="ayah-end-number">\u06DD${toArabicNumber(ayahNum)}</span>
                        </div>
                        <div class="flex items-start gap-4 mt-4">
                            <span class="translation-text text-[10px] font-bold text-teal-600 bg-teal-50 w-6 h-6 flex items-center justify-center rounded-full shrink-0 ${hiddenClass}">${ayahNum}</span>
                            <p class="translation-text text-sm text-slate-500 italic leading-relaxed ${hiddenClass}">${translation}</p>
                        </div>
                    </div>`;
                });
                
                c.innerHTML = html; 
                c.scrollTo(0,0);
                if(type === 'surah') updateMurottalBtn(currentAudio && !currentAudio.paused);
            } catch (e) { c.innerHTML = '<p class="text-center p-10">Gagal memuat konten.</p>'; }
        }

        function handleMurottal() {
            if (currentAudio && !currentAudio.paused) { currentAudio.pause(); updateMurottalBtn(false); return; }
            if (!currentAudio || currentAudio.src !== currentAudioUrl) {
                if(currentAudio) currentAudio.pause();
                currentAudio = new Audio(currentAudioUrl);
                currentAudio.onplay = () => updateMurottalBtn(true);
                currentAudio.onpause = () => updateMurottalBtn(false);
                currentAudio.onended = () => updateMurottalBtn(false);
            }
            currentAudio.play();
        }

        function updateMurottalBtn(isPlaying) {
            const btn = document.getElementById('murottal-btn');
            if(btn) {
                btn.innerHTML = isPlaying ? `<i class="fa-solid fa-pause"></i> <span>Jeda Murottal</span>` : `<i class="fa-solid fa-play"></i> <span>Putar Murottal</span>`;
                btn.classList.toggle('playing', isPlaying);
            }
        }

        function stopAudio() { if (currentAudio) { currentAudio.pause(); currentAudio = null; } }
    </script>
</section>
        <!-- =============================================
             KLP 5: MODUL KALENDER
             ============================================= -->
        <section id="module-calendar">
            <style>
                .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
                .calendar-date { aspect-ratio: 1/1.3; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid #f8fafc; }
                .date-masehi { font-size: 13px; font-weight: 700; }
                .date-hijri { font-size: 8px; color: #0d9488; font-weight: 600; }
                .date-pasaran { font-size: 7px; color: #94a3b8; text-transform: uppercase; font-weight: 700; }
                .date-today { background: #0d9488; color: white !important; }
                .date-holiday { color: #ef4444; }
            </style>

            <div id="calendar-modal" class="modal-full">
                <div class="bg-slate-800 p-5 text-white flex justify-between items-center shadow-md">
                    <button onclick="toggleCalendar()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
                    <h2 id="calendar-month-name" class="font-bold text-xs uppercase tracking-widest">Kalender</h2>
                    <div class="flex gap-2">
                        <button onclick="changeMonth(-1)" class="p-2"><i class="fa-solid fa-chevron-left"></i></button>
                        <button onclick="changeMonth(1)" class="p-2"><i class="fa-solid fa-chevron-right"></i></button>
                    </div>
                </div>
                <div class="flex-1 overflow-y-auto p-4 bg-white pb-24">
                    <div class="calendar-grid mb-2">
                        <div class="text-center text-[10px] font-bold text-red-500">MIN</div><div class="text-center text-[10px] font-bold">SEN</div><div class="text-center text-[10px] font-bold">SEL</div><div class="text-center text-[10px] font-bold">RAB</div><div class="text-center text-[10px] font-bold">KAM</div><div class="text-center text-[10px] font-bold text-teal-600">JUM</div><div class="text-center text-[10px] font-bold">SAB</div>
                    </div>
                    <div id="calendar-days-grid" class="calendar-grid"></div>
                    <div id="holiday-list" class="mt-6 space-y-2 border-t pt-4"></div>
                </div>
            </div>

            <script>
                let currentCalDate = new Date();
                let nationalHolidays = [];

                function toggleCalendar() {
                    const el = document.getElementById('calendar-modal');
                    if (!el.classList.contains('modal-show')) {
                        el.classList.add('modal-show'); if (nationalHolidays.length === 0) fetchHolidays();
                        renderCalendar(); pushState('calendar');
                    } else { history.back(); }
                }

                function getPasaran(date) {
                    const p = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
                    const diff = Math.floor((date - new Date(1900, 0, 1)) / 86400000);
                    return p[(diff + 1) % 5];
                }

                function getHijri(date) {
                    let jd = Math.floor(date.getTime() / 86400000) + 2440588;
                    let l = jd - 1948440 + 10632;
                    let n = Math.floor((l - 1) / 10631);
                    l = l - 10631 * n + 354;
                    let j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) + (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
                    l = l - (Math.floor((30 - j) / 20)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 30)) * (Math.floor((15238 * j) / 43)) + 29;
                    const ms = ["Muharram", "Safar", "Rabiul Awal", "Rabiul Akhir", "Jumadil Ula", "Jumadil Akhira", "Rajab", "Syaban", "Ramadhan", "Syawal", "Dzulqo'dah", "Dzulhijjah"];
                    let mIdx = Math.floor((24 * l) / 709);
                    return { d: l - Math.floor((709 * mIdx) / 24), m: ms[mIdx - 1], y: 30 * n + j - 30 };
                }

                async function fetchHolidays() {
                    try {
                        const res = await fetch(`https://libur.deno.dev/api?year=${currentCalDate.getFullYear()}`);
                        nationalHolidays = await res.json(); renderCalendar();
                    } catch (e) {}
                }

                function renderCalendar() {
                    const grid = document.getElementById('calendar-days-grid');
                    const holEl = document.getElementById('holiday-list');
                    grid.innerHTML = ''; holEl.innerHTML = '';
                    const y = currentCalDate.getFullYear(); const m = currentCalDate.getMonth();
                    const start = new Date(y, m, 1).getDay(); const total = new Date(y, m + 1, 0).getDate();
                    const ms = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
                    document.getElementById('calendar-month-name').innerText = `${ms[m]} ${y}`;
                    for (let i = 0; i < start; i++) grid.innerHTML += '<div></div>';
                    for (let d = 1; d <= total; d++) {
                        const date = new Date(y, m, d); const h = getHijri(date);
                        const isHol = nationalHolidays.find(x => x.date === date.toISOString().split('T')[0]);
                        const isToday = new Date().toDateString() === date.toDateString();
                        grid.innerHTML += `<div class="calendar-date ${isToday ? 'date-today' : ''} ${isHol || date.getDay() === 0 ? 'date-holiday' : ''}"><span class="date-masehi">${d}</span><span class="date-hijri">${h.d}</span><span class="date-pasaran">${getPasaran(date)}</span></div>`;
                        if (isHol) holEl.innerHTML += `<div class="flex gap-2 text-[10px] items-start"><span class="font-bold text-red-500">${d}</span><p class="text-slate-600 font-medium">${isHol.name}</p></div>`;
                    }
                }
                function changeMonth(v) { currentCalDate.setMonth(currentCalDate.getMonth() + v); renderCalendar(); }
            </script>
        </section>

        <!-- =============================================
             KLP 6: DOA MODAL
             ============================================= -->
        <section id="module-doa">
            <div id="doa-modal" class="modal-full">
                <div class="bg-teal-800 p-5 text-white flex justify-between items-center shadow-md">
                    <button onclick="toggleDoa()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
                    <h2 class="font-bold text-xs uppercase tracking-widest">Doa Harian</h2>
                    <div class="w-10"></div>
                </div>
                <div class="flex-1 p-10 text-center text-slate-400 italic">Fitur Doa Segera Hadir...</div>
            </div>
            <script>
                function toggleDoa() {
                    const el = document.getElementById('doa-modal');
                    if (!el.classList.contains('modal-show')) { el.classList.add('modal-show'); pushState('doa'); } else { history.back(); }
                }
            </script>
        </section>

        <!-- =============================================
             KLP 7: NAV BAR & LOCATION PICKER
             ============================================= -->
        <section id="module-nav">
            <style>
                .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0 28px 0; border-top: 1px solid #f1f5f9; z-index: 100; }
                .nav-item { color: #0d9488; transition: all 0.2s ease; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-weight: 500; }
                .nav-item.active { font-weight: 700; }
            </style>
            <nav class="bottom-nav">
                <a onclick="location.reload()" class="nav-item active"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[10px] mt-1">Beranda</span></a>
                <a onclick="toggleQuran()" class="nav-item"><i class="fa-solid fa-book-quran text-xl"></i><span class="text-[10px] mt-1">Quran</span></a>
                <a onclick="toggleCalendar()" class="nav-item"><i class="fa-solid fa-calendar-days text-xl"></i><span class="text-[10px] mt-1">Kalender</span></a>
                <a onclick="toggleDoa()" class="nav-item"><i class="fa-solid fa-hands-praying text-xl"></i><span class="text-[10px] mt-1">Doa</span></a>
            </nav>

            <div id="location-sheet-bg" onclick="toggleLocationSheet()" class="fixed inset-0 bg-slate-900/40 z-[250] hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm"></div>
            <div id="location-sheet" class="fixed bottom-0 left-0 right-0 bg-white z-[300] rounded-t-[32px] p-8 translate-y-full transition-transform duration-500 max-w-[500px] mx-auto shadow-2xl">
                <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
                <h3 class="text-center text-lg font-bold text-slate-800 mb-6 uppercase">Atur Wilayah</h3>
                <div class="space-y-4">
                    <button onclick="getCoreData(); toggleLocationSheet()" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-teal-50 text-teal-700 font-semibold active:scale-95 transition-all"><i class="fa-solid fa-crosshairs text-lg"></i><span>Gunakan GPS Otomatis</span></button>
                    <div class="relative"><input type="text" id="manual-city-input" placeholder="Nama kota..." class="w-full p-4 pl-12 rounded-2xl bg-slate-50 text-sm border-none focus:ring-2 focus:ring-teal-500 font-medium uppercase tracking-tight"><i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i></div>
                    <button onclick="toggleLocationSheet()" class="w-full p-4 bg-slate-800 text-white rounded-2xl font-bold text-sm">Tutup</button>
                </div>
            </div>
            <script>
                function toggleLocationSheet() {
                    const sheet = document.getElementById('location-sheet');
                    const bg = document.getElementById('location-sheet-bg');
                    if (sheet.classList.contains('translate-y-full')) {
                        sheet.classList.remove('translate-y-full');
                        bg.classList.remove('hidden');
                        setTimeout(() => bg.classList.add('opacity-100'), 10);
                        pushState('location');
                    } else { history.back(); }
                }
            </script>
        </section>

    </div>

    <!-- =============================================
         KLP 8: GLOBAL INITIALIZATION
         ============================================= -->
    <script>
        function updateDateTime() {
            const now = new Date(); const h = getHijri(now);
            const ds = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const ms = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('full-date').innerText = `${ds[now.getDay()]} ${getPasaran(now)}, ${now.getDate()} ${ms[now.getMonth()]} ${now.getFullYear()} M`;
            document.getElementById('java-hijri').innerText = `${h.d} ${h.m} ${h.y} H`;
        }

        window.onload = () => {
            updateDateTime();
            getCoreData();
            startCountdown();
        };
    </script>
</body>
</html>
