<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    
    <!-- [SECTION: RESOURCES] -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* [GROUP: CORE & MODAL] */
        *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; margin:0; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; background-color: white; min-height: 100vh; position: relative; padding-bottom: 120px; }
        .modal-full { position: fixed; inset: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }
        .modal-show { transform: translateY(0) !important; }
        .teal-header { background-color: #0d9488; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }

        /* [GROUP: CALENDAR BOXES] */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 10px; }
        .calendar-box { 
            aspect-ratio: 1/1.2; background: #fff; border: 1px solid #f1f5f9; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .date-masehi { font-size: 14px; font-weight: 700; }
        .date-hijri { font-size: 8px; color: #0d9488; font-weight: 600; }
        .date-weton { font-size: 7px; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        
        /* Highlight States */
        .is-today { background: #0d9488 !important; border-color: #0d9488; color: white !important; }
        .is-today span { color: white !important; }
        .is-holiday, .is-sunday { color: #ef4444 !important; }
        .is-holiday .date-masehi, .is-sunday .date-masehi { color: #ef4444; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid #f1f5f9; z-index: 100; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- HEADER PENGGANTI (Minimalis) -->
        <div style="background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); height: 180px; border-radius: 0 0 40px 40px; padding: 40px 20px; color: white;">
            <h1 class="text-2xl font-bold">Portal Darussalam</h1>
            <p class="text-xs opacity-80 mt-1" id="display-date">Memuat tanggal...</p>
        </div>

        <div class="p-6 grid grid-cols-2 gap-4">
            <div onclick="App.toggleCalendar()" class="bg-white border p-6 rounded-3xl text-center shadow-sm active:scale-95 transition-all">
                <i class="fa-solid fa-calendar-days text-2xl text-teal-600 mb-2"></i>
                <p class="text-xs font-bold uppercase text-slate-700">Kalender</p>
            </div>
            <div onclick="App.toggleQuran()" class="bg-white border p-6 rounded-3xl text-center shadow-sm active:scale-95 transition-all">
                <i class="fa-solid fa-book-quran text-2xl text-teal-600 mb-2"></i>
                <p class="text-xs font-bold uppercase text-slate-700">Al-Quran</p>
            </div>
        </div>

        <nav class="bottom-nav">
            <a onclick="location.reload()" class="flex flex-col items-center text-teal-600 font-bold"><i class="fa-solid fa-house"></i><span class="text-[10px] mt-1">BERANDA</span></a>
            <a onclick="App.toggleCalendar()" class="flex flex-col items-center text-slate-400 font-bold"><i class="fa-solid fa-calendar"></i><span class="text-[10px] mt-1">KALENDER</span></a>
        </nav>
    </div>

    <!-- MODAL KALENDER -->
    <div id="calendar-modal" class="modal-full">
        <div class="teal-header">
            <button onclick="App.toggleCalendar()"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="text-center">
                <h2 id="cal-month-name" class="font-bold text-sm uppercase tracking-widest">---</h2>
                <p class="text-[9px] opacity-80 uppercase font-bold">Nasional & Hijriyah</p>
            </div>
            <div class="flex gap-4">
                <button onclick="Calendar.changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="Calendar.changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto bg-white pb-32">
            <div class="calendar-grid text-[10px] font-extrabold text-slate-400 text-center mb-1">
                <div class="text-red-500">MIN</div><div>SEN</div><div>SEL</div><div>RAB</div><div>KAM</div><div class="text-teal-600">JUM</div><div>SAB</div>
            </div>
            <div id="calendar-main-grid" class="calendar-grid"></div>
            
            <!-- KETERANGAN SPESIAL -->
            <div class="px-6 mt-6">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <i class="fa-solid fa-circle-info text-teal-600"></i> Keterangan Spesial
                </h3>
                <div id="holiday-info" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const App = {
            toggleCalendar() { document.getElementById('calendar-modal').classList.toggle('modal-show'); if(document.getElementById('calendar-modal').classList.contains('modal-show')) Calendar.init(); },
            toggleQuran() { alert("Fitur Quran aktif sesuai kode sebelumnya."); }
        };

        const Calendar = {
            curDate: new Date(),
            holidays: {},

            async init() {
                await this.fetchHolidays();
                this.render();
            },

            async fetchHolidays() {
                const year = this.curDate.getFullYear();
                try {
                    // API yang lebih stabil untuk hari libur Indonesia
                    const res = await fetch(`https://api-harilibur.vercel.app/api?year=${year}`);
                    if (res.ok) {
                        const data = await res.json();
                        this.holidays = {};
                        data.forEach(item => {
                            this.holidays[item.holiday_date] = item.holiday_name;
                        });
                    }
                } catch (e) {
                    console.error("Gagal load libur nasional");
                }
            },

            getWeton(date) {
                const wetons = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
                const start = new Date(1900, 0, 1);
                const diff = Math.floor((date - start) / 86400000);
                return wetons[(diff + 1) % 5];
            },

            getHijri(date) {
                let jd = Math.floor(date.getTime() / 86400000) + 2440588;
                let l = jd - 1948440 + 10632;
                let n = Math.floor((l - 1) / 10631);
                l = l - 10631 * n + 354;
                let j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) + (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
                l = l - (Math.floor((30 - j) / 20)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 30)) * (Math.floor((15238 * j) / 43)) + 29;
                let m = Math.floor((24 * l) / 709);
                let d = l - Math.floor((709 * m) / 24);
                const ms = ["Muharram","Safar","Rabiul Awal","Rabiul Akhir","Jumadil Ula","Jumadil Akhira","Rajab","Syaban","Ramadhan","Syawal","Dzulqo'dah","Dzulhijjah"];
                return { d, m: ms[m-1] };
            },

            render() {
                const grid = document.getElementById('calendar-main-grid');
                const info = document.getElementById('holiday-info');
                grid.innerHTML = ''; info.innerHTML = '';
                
                const y = this.curDate.getFullYear(), m = this.curDate.getMonth();
                const start = new Date(y, m, 1).getDay(), total = new Date(y, m + 1, 0).getDate();
                const names = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
                
                document.getElementById('cal-month-name').innerText = `${names[m]} ${y}`;

                for (let i = 0; i < start; i++) grid.innerHTML += '<div></div>';

                for (let d = 1; d <= total; d++) {
                    const date = new Date(y, m, d);
                    const dateKey = date.toISOString().split('T')[0];
                    const libur = this.holidays[dateKey];
                    const isToday = date.toDateString() === new Date().toDateString();
                    const h = this.getHijri(date);

                    grid.innerHTML += `
                        <div class="calendar-box ${isToday ? 'is-today' : ''} ${libur || date.getDay() === 0 ? 'is-holiday' : ''}">
                            <span class="date-masehi">${d}</span>
                            <span class="date-hijri">${h.d}</span>
                            <span class="date-weton">${this.getWeton(date)}</span>
                        </div>`;

                    if (libur) {
                        info.innerHTML += `
                            <div class="flex gap-4 p-4 bg-red-50 rounded-2xl border border-red-100 shadow-sm">
                                <div class="w-10 h-10 bg-red-500 text-white rounded-xl flex items-center justify-center font-bold shrink-0 text-sm">${d}</div>
                                <div>
                                    <p class="text-[9px] text-red-500 font-bold uppercase tracking-wider">Hari Libur Nasional</p>
                                    <p class="text-xs font-bold text-slate-800 leading-tight">${libur}</p>
                                </div>
                            </div>`;
                    }
                }
                
                if (info.innerHTML === '') {
                    info.innerHTML = '<p class="text-[11px] text-slate-400 italic">Tidak ada hari libur nasional bulan ini.</p>';
                }
            },
            changeMonth(v) { this.curDate.setMonth(this.curDate.getMonth() + v); this.init(); }
        };

        const now = new Date();
        document.getElementById('display-date').innerText = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    </script>
</body>
</html>
