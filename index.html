<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam - Kalender Lengkap</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; margin:0; }
        .app-container { width: 100%; max-width: 500px; background-color: white; min-height: 100vh; position: relative; padding-bottom: 120px; }
        
        /* MODAL SYSTEM */
        .modal-full { position: fixed; inset: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }
        .modal-show { transform: translateY(0) !important; }
        
        /* HEADER TEAL (#0d9488) */
        .teal-header { background-color: #0d9488; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2); }

        /* GRID KALENDER */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 12px; }
        .calendar-box { 
            aspect-ratio: 1/1.3; background: #fff; border: 1px solid #f1f5f9; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .date-masehi { font-size: 15px; font-weight: 700; color: #1e293b; }
        .date-hijri { font-size: 9px; color: #0d9488; font-weight: 700; margin-top: 1px; }
        .date-weton { font-size: 7px; color: #94a3b8; font-weight: 800; text-transform: uppercase; margin-top: 1px; }
        
        /* HIGHLIGHT STATES */
        .is-today { background: #0d9488 !important; border-color: #0d9488; color: white !important; }
        .is-today span { color: white !important; }
        .is-holiday, .is-sunday { background-color: #fff1f2; border-color: #fecdd3; }
        .is-holiday .date-masehi, .is-sunday .date-masehi { color: #e11d48; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid #f1f5f9; z-index: 100; }
    </style>
</head>
<body>

    <div class="app-container">
        <div style="background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); height: 180px; border-radius: 0 0 40px 40px; padding: 40px 25px; color: white;">
            <h1 class="text-2xl font-bold">Portal Darussalam</h1>
            <p class="text-xs opacity-80 mt-1">Kalender Nasional, Hijriyah & Weton</p>
            <button onclick="App.toggleCalendar()" class="mt-6 bg-white/20 px-6 py-3 rounded-2xl text-xs font-bold border border-white/20 active:scale-95 transition-all">
                <i class="fa-solid fa-calendar-days mr-2"></i> BUKA KALENDER LENGKAP
            </button>
        </div>

        <nav class="bottom-nav">
            <a onclick="location.reload()" class="flex flex-col items-center text-teal-600 font-bold"><i class="fa-solid fa-house"></i><span class="text-[10px] mt-1">BERANDA</span></a>
            <a onclick="App.toggleCalendar()" class="flex flex-col items-center text-slate-400 font-bold"><i class="fa-solid fa-calendar"></i><span class="text-[10px] mt-1">KALENDER</span></a>
        </nav>
    </div>

    <div id="calendar-modal" class="modal-full">
        <div class="teal-header">
            <button onclick="App.toggleCalendar()" class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="text-center">
                <h2 id="cal-month-name" class="font-bold text-sm uppercase tracking-widest">---</h2>
                <p class="text-[8px] font-bold opacity-80 uppercase">Nasional • Hijriyah • Weton</p>
            </div>
            <div class="flex gap-2">
                <button onclick="Calendar.changeMonth(-1)" class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-xl"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="Calendar.changeMonth(1)" class="w-10 h-10 flex items-center justify-center bg-white/10 rounded-xl"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto bg-white pb-32">
            <div class="calendar-grid text-[10px] font-black text-slate-300 text-center mb-1">
                <div class="text-red-500">MIN</div><div>SEN</div><div>SEL</div><div>RAB</div><div>KAM</div><div class="text-teal-600">JUM</div><div>SAB</div>
            </div>
            <div id="calendar-main-grid" class="calendar-grid"></div>
            
            <div class="px-6 mt-4">
                <h3 class="text-[10px] font-black text-slate-800 uppercase tracking-widest mb-4 flex items-center gap-2">
                    <span class="w-2 h-4 bg-red-500 rounded-full"></span> Keterangan Spesial (Libur)
                </h3>
                <div id="holiday-info" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const App = {
            toggleCalendar() { 
                const el = document.getElementById('calendar-modal');
                el.classList.toggle('modal-show');
                if(el.classList.contains('modal-show')) Calendar.init();
            }
        };

        const Calendar = {
            curDate: new Date(),
            holidays: {},
            hijriCache: {},

            async init() {
                const grid = document.getElementById('calendar-main-grid');
                grid.innerHTML = '<div class="col-span-7 text-center py-20 text-xs text-slate-400"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Sinkronisasi API...</div>';
                
                await this.fetchHolidays();
                await this.fetchMonthHijri();
                this.render();
            },

            // AMBIL DATA LIBUR NASIONAL
            async fetchHolidays() {
                const year = this.curDate.getFullYear();
                try {
                    const res = await fetch(`https://api-harilibur.vercel.app/api?year=${year}`);
                    const data = await res.json();
                    this.holidays = {};
                    data.forEach(h => {
                        // Simpan dengan format YYYY-MM-DD agar sinkron dengan looping render
                        const d = new Date(h.holiday_date);
                        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                        this.holidays[key] = h.holiday_name;
                    });
                } catch (e) { console.error("Gagal ambil libur"); }
            },

            // AMBIL DATA HIJRIYAH (ALADHAN)
            async fetchMonthHijri() {
                const m = this.curDate.getMonth() + 1;
                const y = this.curDate.getFullYear();
                try {
                    const res = await fetch(`https://api.aladhan.com/v1/gToHCalendar/${m}/${y}`);
                    const json = await res.json();
                    this.hijriCache = {};
                    if(json.data) {
                        json.data.forEach(d => {
                            this.hijriCache[parseInt(d.gregorian.day)] = d.hijri.day;
                        });
                    }
                } catch (e) { console.error("Gagal ambil Hijriah"); }
            },

            // HITUNG WETON (ETONYA)
            getWeton(date) {
                const pasaran = ['Legi', 'Pahing', 'Pon', 'Wage', 'Kliwon'];
                const diff = Math.floor((date - new Date(1900, 0, 1)) / 86400000);
                return pasaran[(diff + 1) % 5];
            },

            render() {
                const grid = document.getElementById('calendar-main-grid');
                const info = document.getElementById('holiday-info');
                grid.innerHTML = ''; info.innerHTML = '';
                
                const y = this.curDate.getFullYear(), m = this.curDate.getMonth();
                const start = new Date(y, m, 1).getDay(), total = new Date(y, m + 1, 0).getDate();
                const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
                
                document.getElementById('cal-month-name').innerText = `${monthNames[m]} ${y}`;

                // Padding awal bulan
                for (let i = 0; i < start; i++) grid.innerHTML += '<div></div>';

                // Looping Tanggal
                for (let d = 1; d <= total; d++) {
                    const date = new Date(y, m, d);
                    const dateKey = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    
                    const liburName = this.holidays[dateKey];
                    const isSunday = date.getDay() === 0;
                    const isToday = date.toDateString() === new Date().toDateString();
                    const hijriDay = this.hijriCache[d] || '?';

                    grid.innerHTML += `
                        <div class="calendar-box ${isToday ? 'is-today' : ''} ${liburName || isSunday ? 'is-holiday' : ''}">
                            <span class="date-masehi">${d}</span>
                            <span class="date-hijri">${hijriDay}</span>
                            <span class="date-weton">${this.getWeton(date)}</span>
                        </div>`;

                    if (liburName) {
                        info.innerHTML += `
                            <div class="flex gap-4 p-4 bg-red-50 rounded-2xl border border-red-100 shadow-sm">
                                <div class="w-10 h-10 bg-red-500 text-white rounded-xl flex items-center justify-center font-black shrink-0 text-xs">${d}</div>
                                <div>
                                    <p class="text-[9px] text-red-600 font-bold uppercase tracking-widest">Libur Nasional</p>
                                    <p class="text-xs font-bold text-slate-800 leading-tight">${liburName}</p>
                                </div>
                            </div>`;
                    }
                }
                if(info.innerHTML === "") info.innerHTML = '<p class="text-center text-xs text-slate-400 py-4 italic">Tidak ada hari libur nasional bulan ini.</p>';
            },
            changeMonth(v) { this.curDate.setMonth(this.curDate.getMonth() + v); this.init(); }
        };
    </script>
</body>
</html>
