<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Amiri+Quran&display=swap');
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: #f0fdfa; 
            display: flex; 
            justify-content: center; 
            margin:0; 
        }

        .app-container { 
            width: 100%; 
            max-width: 500px; 
            background-color: white; 
            min-height: 100vh; 
            position: relative; 
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
            padding-bottom: 40px;
        }

        /* Kembali ke Header Teal Solid sesuai Gambar */
        .header-bg { 
            background-color: #0d9488; 
            height: 220px; 
            border-radius: 0 0 40px 40px; 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .calligraphy {
            font-family: 'Amiri Quran', serif;
            font-size: 45px;
            color: white;
            margin-bottom: 10px;
        }

        /* Card Kapsul Putih Bersih (Tanpa Transparansi) */
        .info-capsule {
            position: absolute;
            bottom: -75px;
            left: 50%;
            transform: translateX(-50%);
            width: 88%;
            background: white;
            border-radius: 25px;
            padding: 18px 22px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            border: 1px solid #f1f5f9;
            z-index: 20;
        }

        .menu-card {
            background: white; 
            border-radius: 16px; 
            padding: 20px; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
        }

        .footer-text {
            color: #0d9488;
            font-weight: bold;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-bg">
            <div class="calligraphy" dir="rtl">المختار</div>
            
            <div class="info-capsule">
                <div class="grid grid-cols-3 items-center border-b pb-3 mb-3">
                    <div class="flex flex-col">
                        <span class="text-[9px] text-gray-400 font-bold uppercase">Lokasi</span>
                        <span id="location-text" class="text-[11px] font-bold text-teal-700 truncate w-20 italic">Mencari...</span>
                    </div>
                    <div class="flex flex-col items-center">
                        <span id="prayer-name" class="text-[10px] text-teal-600 font-bold uppercase tracking-widest">---</span>
                        <h2 id="prayer-time" class="text-2xl font-bold text-gray-800 tracking-tighter">--:--</h2>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[9px] text-red-400 font-bold uppercase tracking-tighter">Mendatang</span>
                        <span id="countdown" class="text-[11px] font-bold text-gray-600 font-mono">-00:00:00</span>
                    </div>
                </div>

                <div class="text-center">
                    <p id="full-date" class="text-[11px] font-bold text-gray-700 uppercase"></p>
                    <p id="java-hijri" class="text-[10px] text-emerald-600 font-medium mt-0.5 tracking-wide"></p>
                </div>
            </div>
        </div>

        <div class="mt-24 text-center px-6">
            <h1 class="text-xl font-bold text-teal-800">Darussalam Online</h1>
            <p class="text-[10px] text-gray-400 mt-1 uppercase tracking-widest font-bold">Pesantren Digital Ecosystem</p>
        </div>

        <div class="grid grid-cols-2 gap-4 p-6 mt-4">
            <div class="menu-card">
                <i class="fa-solid fa-mosque text-3xl text-emerald-700 mb-3"></i>
                <span class="text-[13px] font-semibold text-gray-700">Profil Madrasah</span>
            </div>
            <div class="menu-card">
                <i class="fa-solid fa-book-open text-3xl text-blue-700 mb-3"></i>
                <span class="text-[13px] font-semibold text-gray-700">Kegiatan Santri</span>
            </div>
            <div class="menu-card">
                <i class="fa-solid fa-file-signature text-3xl text-gray-500 mb-3"></i>
                <span class="text-[13px] font-semibold text-gray-700">Pendaftaran</span>
            </div>
            <div class="menu-card">
                <i class="fa-solid fa-heart-pulse text-3xl text-red-600 mb-3"></i>
                <span class="text-[13px] font-semibold text-gray-700">Program Donasi</span>
            </div>
        </div>

        <footer class="mt-10 mb-10 text-center border-t pt-6 mx-6">
            <p class="footer-text uppercase">Darussalam</p>
            <p class="text-[10px] text-gray-400 mt-1">© 2026 2026 M / 1447 H • All Rights Reserved</p>
        </footer>
    </div>

    <script>
        let nextPrayerTime = null;

        function updateDates() {
            const now = new Date();
            const hari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const pasaran = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
            const refDate = new Date(1900, 0, 1);
            const diffDays = Math.floor((now - refDate) / (86400000));
            
            const masehiStr = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long' }) + " 2026 M";
            document.getElementById('full-date').innerText = `${hari[now.getDay()]} ${pasaran[(diffDays + 1) % 5]}, ${masehiStr}`;
            document.getElementById('java-hijri').innerText = `1959 AJ / 1447 H`;
        }

        async function getCoreData() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;

                    try {
                        const locRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18`);
                        const locData = await locRes.json();
                        const addr = locData.address;
                        document.getElementById('location-text').innerText = addr.amenity || addr.building || addr.road || addr.suburb || "Lokasi Aktif";
                    } catch(e) { document.getElementById('location-text').innerText = "Lokasi Aktif"; }

                    const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                    const json = await res.json();
                    setPrayerUI(json.data.timings);
                }, null, { enableHighAccuracy: true });
            }
        }

        function setPrayerUI(timings) {
            const now = new Date();
            const currentTotal = (now.getHours() * 60) + now.getMinutes();
            const schedule = [
                { name: 'Subuh', time: timings.Fajr },
                { name: 'Dzuhur', time: timings.Dhuhr },
                { name: 'Ashar', time: timings.Asr },
                { name: 'Maghrib', time: timings.Maghrib },
                { name: 'Isya', time: timings.Isha }
            ];
            let next = schedule.find(s => {
                const [h, m] = s.time.split(':');
                return (parseInt(h) * 60 + parseInt(m)) > currentTotal;
            }) || schedule[0];

            document.getElementById('prayer-name').innerText = next.name;
            document.getElementById('prayer-time').innerText = next.time;
            const [tH, tM] = next.time.split(':');
            nextPrayerTime = new Date();
            nextPrayerTime.setHours(parseInt(tH), parseInt(tM), 0);
            if (nextPrayerTime < now) nextPrayerTime.setDate(nextPrayerTime.getDate() + 1);
        }

        function startCountdown() {
            setInterval(() => {
                if (!nextPrayerTime) return;
                const diff = nextPrayerTime - new Date();
                if (diff <= 0) { getCoreData(); return; }
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('countdown').innerText = `-${h}:${m}:${s}`;
            }, 1000);
        }

        updateDates();
        getCoreData();
        startCountdown();
    </script>
</body>
</html>
