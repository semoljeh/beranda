<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Darussalam">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/semoljeh/link/main/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        @font-face {
            font-family: 'LPMQ';
            src: url('https://kemenag.go.id/assets/fonts/lpmq.ttf');
        }

        .font-arab { font-family: 'LPMQ', serif; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            display: flex; 
            justify-content: center; 
            margin:0; 
            color: #1e293b;
        }

        .app-container { 
            width: 100%; 
            max-width: 500px; 
            background-color: white; 
            min-height: 100vh; 
            position: relative; 
            padding-bottom: 120px;
        }
        
        .header-bg { 
            background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%);
            height: 220px; 
            border-radius: 0 0 40px 40px; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 40px; 
        }

        .location-capsule {
            display: flex; align-items: center; gap: 6px; 
            background-color: rgba(255,255,255,0.15);
            padding: 8px 14px; border-radius: 100px; 
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; backdrop-filter: blur(4px);
            transition: transform 0.2s;
        }
        .location-capsule:active { transform: scale(0.95); }

        .info-capsule {
            position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%); width: 90%;
            background: white; border-radius: 30px; padding: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9; z-index: 20;
        }

        .menu-card {
            background: #ffffff; border-radius: 20px; padding: 20px; 
            display: flex; flex-direction: column; align-items: center; 
            text-align: center; border: 1px solid #f1f5f9;
            transition: transform 0.2s ease;
        }
        .menu-card:active { transform: scale(0.96); background-color: #f8fafc; }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 500px;
            background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around;
            padding: 12px 0 24px 0; border-top: 1px solid #f1f5f9; z-index: 100;
        }
        
        .nav-item { color: #64748b; transition: color 0.2s; cursor: pointer; }
        .nav-item.active { color: #0d9488; }

        #quran-modal { transition: transform 0.4s ease; z-index: 200; }
        .hidden-quran { transform: translateY(100%); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-bg">
            <div onclick="toggleLocationSheet()" class="location-capsule">
                <i class="fa-solid fa-location-dot text-white text-[10px]"></i>
                <span id="location-text" class="text-[11px] font-semibold text-white tracking-tight truncate max-w-[150px]">
                    Mencari Lokasi...
                </span>
                <i class="fa-solid fa-chevron-down text-white/50 text-[9px]"></i>
            </div>

            <div class="info-capsule">
                <div class="flex items-center justify-between">
                    <div class="flex-1 text-center">
                        <p id="prayer-name" class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-1">---</p>
                        <h2 id="prayer-time" class="text-4xl font-bold text-slate-800 tracking-tight leading-none">--:--</h2>
                    </div>
                    <div class="w-[1px] h-10 bg-slate-100"></div>
                    <div class="flex-1 text-center">
                        <p class="text-[10px] text-red-400 font-bold uppercase tracking-[0.15em] mb-1">Mendatang</p>
                        <span id="countdown" class="text-xl font-semibold text-slate-700 font-mono tracking-tighter">
                            -00:00:00
                        </span>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-slate-50 text-center">
                    <p id="full-date" class="text-[11px] font-medium text-slate-500 mb-1"></p>
                    <p id="java-hijri" class="text-xs text-teal-600 font-arab" dir="rtl"></p>
                </div>
            </div>
        </div>

        <div class="mt-24 text-center px-8">
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">Darussalam Online</h1>
            <p class="text-xs text-slate-400 font-medium">Digital Portal Madrasah</p>
        </div>

        <div class="grid grid-cols-2 gap-4 p-6">
            <div class="menu-card">
                <div class="w-12 h-12 bg-teal-50 text-teal-600 rounded-2xl flex items-center justify-center text-xl mb-3">
                    <i class="fa-solid fa-mosque"></i>
                </div>
                <span class="text-xs font-semibold text-slate-700 uppercase tracking-tight">Profil</span>
            </div>
            <div class="menu-card">
                <div class="w-12 h-12 bg-blue-50 text-blue-600 rounded-2xl flex items-center justify-center text-xl mb-3">
                    <i class="fa-solid fa-book-open"></i>
                </div>
                <span class="text-xs font-semibold text-slate-700 uppercase tracking-tight">Kegiatan</span>
            </div>
            <div class="menu-card">
                <div class="w-12 h-12 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center text-xl mb-3">
                    <i class="fa-solid fa-file-signature"></i>
                </div>
                <span class="text-xs font-semibold text-slate-700 uppercase tracking-tight">Daftar</span>
            </div>
            <div class="menu-card">
                <div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center text-xl mb-3">
                    <i class="fa-solid fa-heart-pulse"></i>
                </div>
                <span class="text-xs font-semibold text-slate-700 uppercase tracking-tight">Donasi</span>
            </div>
        </div>

        <nav class="bottom-nav">
            <a onclick="location.reload()" class="nav-item active flex flex-col items-center">
                <i class="fa-solid fa-house-chimney text-xl"></i>
                <span class="text-[10px] font-bold mt-1">Home</span>
            </a>
            <a onclick="toggleQuran()" class="nav-item flex flex-col items-center">
                <i class="fa-solid fa-book-quran text-xl"></i>
                <span class="text-[10px] font-bold mt-1">Quran</span>
            </a>
            <a href="#" class="nav-item flex flex-col items-center">
                <i class="fa-solid fa-hands-praying text-xl"></i>
                <span class="text-[10px] font-bold mt-1">Doa</span>
            </a>
        </nav>
    </div>

    <div id="quran-modal" class="fixed inset-0 bg-white hidden-quran flex flex-col max-w-[500px] mx-auto shadow-2xl">
        <div class="bg-teal-700 p-5 text-white flex justify-between items-center shadow-lg">
            <button onclick="toggleQuran()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <h2 class="font-medium text-[10px] tracking-[0.2em] uppercase">Al-Quran Digital</h2>
            <button onclick="toggleTranslation()" id="btn-trans" class="text-[8px] bg-white/20 px-3 py-2 rounded-lg font-medium uppercase">Hide Translation</button>
        </div>
        <div id="quran-content" class="flex-1 overflow-y-auto p-5 bg-slate-50 pb-24">
            <div class="text-center py-20 text-gray-400">
                <i class="fa-solid fa-spinner animate-spin text-3xl mb-4 text-teal-600"></i>
                <p class="text-[10px] uppercase font-bold">Memuat Surah...</p>
            </div>
        </div>
    </div>

    <div id="location-sheet-bg" onclick="toggleLocationSheet()" class="fixed inset-0 bg-slate-900/40 z-[250] hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm"></div>
    <div id="location-sheet" class="fixed bottom-0 left-0 right-0 bg-white z-[300] rounded-t-[32px] p-8 translate-y-full transition-transform duration-500 max-w-[500px] mx-auto shadow-2xl">
        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
        <h3 class="text-center text-lg font-bold text-slate-800 mb-6 tracking-tight">Atur Lokasi</h3>
        <div class="space-y-4">
            <button onclick="getCoreData(); toggleLocationSheet()" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-teal-50 text-teal-700 font-semibold active:scale-95 transition-all">
                <i class="fa-solid fa-crosshairs text-lg"></i>
                <span>Gunakan Lokasi Saat Ini</span>
            </button>
            <div class="relative">
                <input type="text" id="manual-city-input" placeholder="Cari nama kota..." class="w-full p-4 pl-12 rounded-2xl bg-slate-50 border-none text-sm focus:ring-2 focus:ring-teal-500 font-medium uppercase tracking-tight">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
            </div>
            <button onclick="handleManualSearch()" class="w-full p-4 bg-slate-800 text-white rounded-2xl font-bold text-sm active:scale-95 transition-all">Pilih Kota</button>
        </div>
    </div>

    <script>
        let nextPrayerTime = null;
        let showTranslation = true;

        // 1. UPDATE TANGGAL & JAM
        function updateDates() {
            const now = new Date();
            const hari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const pasaran = ["Legi", "Pahing", "Pon", "Wage", "Kliwon"];
            const refDate = new Date(1900, 0, 1);
            const diffDays = Math.floor((now - refDate) / 86400000);
            const masehiStr = now.toLocaleDateString('id-ID', { day: 'numeric', month: 'long' }) + " 2026 M";
            document.getElementById('full-date').innerText = `${hari[now.getDay()]} ${pasaran[(diffDays + 1) % 5]}, ${masehiStr}`;
            document.getElementById('java-hijri').innerText = `Tahun Jawa 1959 AJ / 1447 H`;
        }

        // 2. AMBIL DATA LOKASI & SHOLAT (OFFLINE READY)
        async function getCoreData() {
            const cachedLocation = localStorage.getItem('last_location');
            const cachedTimings = localStorage.getItem('last_timings');

            if (cachedLocation) document.getElementById('location-text').innerText = cachedLocation;
            if (cachedTimings) setPrayerUI(JSON.parse(cachedTimings));

            if (navigator.onLine && navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    try {
                        const locRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
                        const locData = await locRes.json();
                        const addr = locData.address;
                        const displayLoc = addr.village || addr.suburb || addr.neighbourhood || addr.city_district || addr.city || "Lokasi Terdeteksi";
                        
                        document.getElementById('location-text').innerText = displayLoc;
                        localStorage.setItem('last_location', displayLoc);

                        const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                        const json = await res.json();
                        setPrayerUI(json.data.timings);
                        localStorage.setItem('last_timings', JSON.stringify(json.data.timings));
                    } catch(e) { console.log("Cache used."); }
                });
            }
        }

        function setPrayerUI(timings) {
            const now = new Date();
            const currentTotal = (now.getHours() * 60) + now.getMinutes();
            const schedule = [
                { name:'Subuh', time:timings.Fajr }, { name:'Dzuhur', time:timings.Dhuhr }, 
                { name:'Ashar', time:timings.Asr }, { name:'Maghrib', time:timings.Maghrib }, 
                { name:'Isya', time:timings.Isha }
            ];
            let next = schedule.find(s => {
                const [h, m] = s.time.split(':');
                return (parseInt(h) * 60 + parseInt(m)) > currentTotal;
            }) || schedule[0];

            document.getElementById('prayer-name').innerText = next.name;
            document.getElementById('prayer-time').innerText = next.time;
            const [tH, tM] = next.time.split(':');
            nextPrayerTime = new Date();
            nextPrayerTime.setHours(parseInt(tH), parseInt(tM), 0);
            if (nextPrayerTime < now) nextPrayerTime.setDate(nextPrayerTime.getDate() + 1);
        }

        function startCountdown() {
            setInterval(() => {
                if (!nextPrayerTime) return;
                const diff = nextPrayerTime - new Date();
                if (diff <= 0) { getCoreData(); return; }
                const h = Math.floor(diff / 3600000).toString().padStart(2,'0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
                document.getElementById('countdown').innerText = `-${h}:${m}:${s}`;
            }, 1000);
        }

        // 3. UI HANDLER (BOTTOM SHEET)
        function toggleLocationSheet() {
            const sheet = document.getElementById('location-sheet');
            const bg = document.getElementById('location-sheet-bg');
            if (sheet.classList.contains('translate-y-full')) {
                bg.classList.remove('hidden');
                setTimeout(() => bg.classList.add('opacity-100'), 10);
                sheet.classList.remove('translate-y-full');
            } else {
                bg.classList.remove('opacity-100');
                sheet.classList.add('translate-y-full');
                setTimeout(() => bg.classList.add('hidden'), 300);
            }
        }

        async function handleManualSearch() {
            const city = document.getElementById('manual-city-input').value;
            if (!city) return;
            document.getElementById('location-text').innerText = "Mencari...";
            toggleLocationSheet();
            try {
                const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${city}&limit=1`);
                const geoData = await geoRes.json();
                if (geoData.length > 0) {
                    const { lat, lon, display_name } = geoData[0];
                    const shortName = display_name.split(',')[0];
                    document.getElementById('location-text').innerText = shortName;
                    localStorage.setItem('last_location', shortName);
                    const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                    const json = await res.json();
                    setPrayerUI(json.data.timings);
                    localStorage.setItem('last_timings', JSON.stringify(json.data.timings));
                }
            } catch (e) { alert("Perlu koneksi internet untuk mencari kota."); }
        }

        // 4. QURAN HANDLER
        function toggleQuran() {
            const modal = document.getElementById('quran-modal');
            if (modal.classList.contains('hidden-quran')) {
                modal.classList.remove('hidden-quran');
                modal.classList.add('show-quran');
                loadSurahList();
            } else {
                modal.classList.remove('show-quran');
                modal.classList.add('hidden-quran');
            }
        }

        async function loadSurahList() {
            const content = document.getElementById('quran-content');
            try {
                const res = await fetch('https://equran.id/api/v2/surat');
                const data = await res.json();
                let html = '<div class="grid grid-cols-1 gap-3">';
                data.data.forEach(surah => {
                    html += `<div onclick="loadDetailSurah(${surah.nomor})" class="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center active:scale-95 transition-transform">
                        <div class="flex items-center gap-4">
                            <span class="w-10 h-10 bg-teal-50 text-teal-700 rounded-xl flex items-center justify-center text-[10px] font-bold">${surah.nomor}</span>
                            <div>
                                <h4 class="font-bold text-sm text-slate-800 uppercase tracking-tight">${surah.namaLatin}</h4>
                                <p class="text-[9px] text-slate-400 font-medium uppercase">${surah.arti} • ${surah.jumlahAyat} Ayat</p>
                            </div>
                        </div>
                        <span class="font-arab text-2xl text-teal-600">${surah.nama}</span>
                    </div>`;
                });
                content.innerHTML = html + '</div>';
            } catch (e) { content.innerHTML = '<p class="text-center p-10">Gagal memuat Al-Quran.</p>'; }
        }

        async function loadDetailSurah(nomor) {
            const content = document.getElementById('quran-content');
            content.innerHTML = `<div class="text-center py-20"><i class="fa-solid fa-spinner animate-spin text-3xl text-teal-600"></i></div>`;
            try {
                const res = await fetch(`https://equran.id/api/v2/surat/${nomor}`);
                const data = await res.json();
                const surah = data.data;
                let html = `<div class="bg-teal-700 p-8 rounded-[40px] text-white text-center mb-8 shadow-lg">
                    <h3 class="font-arab text-5xl mb-3">${surah.nama}</h3>
                    <p class="font-bold text-[10px] uppercase tracking-widest">${surah.namaLatin} • ${surah.arti}</p>
                </div><div class="space-y-12">`;
                surah.ayat.forEach(ayat => {
                    html += `<div class="border-b border-slate-100 pb-10">
                        <div class="flex justify-between items-start gap-6 mb-8">
                            <span class="bg-teal-50 text-teal-600 text-[10px] w-8 h-8 flex items-center justify-center rounded-xl font-bold">${ayat.nomorAyat}</span>
                            <p class="font-arab text-4xl text-right leading-[2.5] text-slate-800 w-full" dir="rtl">${ayat.teksArab}</p>
                        </div>
                        <p class="translation-text text-sm italic border-l-4 border-teal-100 pl-6 font-medium text-slate-500" style="display: ${showTranslation ? 'block' : 'none'}">${ayat.teksIndonesia}</p>
                    </div>`;
                });
                content.innerHTML = html + `</div><button onclick="loadSurahList()" class="w-full mt-10 py-5 bg-teal-50 text-teal-700 rounded-3xl font-bold text-[10px] uppercase border border-teal-100">Kembali ke Daftar</button>`;
            } catch (e) { content.innerHTML = '<p class="text-center">Error memuat detail surah.</p>'; }
        }

        function toggleTranslation() {
            showTranslation = !showTranslation;
            const transElements = document.querySelectorAll('.translation-text');
            const btn = document.getElementById('btn-trans');
            transElements.forEach(el => el.style.display = showTranslation ? 'block' : 'none');
            btn.innerText = showTranslation ? 'Hide Translation' : 'Show Translation';
        }

        // INIT
        updateDates(); 
        getCoreData(); 
        startCountdown();

        // SERVICE WORKER REGISTRATION
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('SW Aktif'))
                .catch(err => console.log('SW Gagal'));
            });
        }
    </script>
</body>
</html>
