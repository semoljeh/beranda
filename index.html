<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Darussalam">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/semoljeh/link/main/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        @font-face {
            font-family: 'Uthmanic';
            src: url('https://cdn.jsdelivr.net/gh/ivandotnet/kuran-data/fonts/KFGQPC-Uthman-Taha-Naskh-Standard.ttf');
        }

        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; margin:0; color: #1e293b; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; background-color: white; min-height: 100vh; position: relative; padding-bottom: 120px; }
        
        /* Header & Info */
        .header-bg { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); height: 220px; border-radius: 0 0 40px 40px; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        .location-capsule { display: flex; align-items: center; gap: 6px; background-color: rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; backdrop-filter: blur(4px); z-index: 30; }
        .info-capsule { position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%); width: 90%; background: white; border-radius: 30px; padding: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; z-index: 20; }

        /* Consisten Footer Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background-color: #ffffff; display: flex; justify-content: space-around; padding: 12px 0 28px 0; border-top: 1px solid #f1f5f9; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.02); }
        .nav-item { color: #64748b; transition: all 0.2s ease; cursor: pointer; display: flex; flex-direction: column; align-items: center; }
        .nav-item.active { color: #0d9488; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item span { font-size: 10px; font-weight: 700; text-transform: uppercase; }

        /* Modal Al-Quran */
        .modal-full { position: fixed; inset: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }
        .modal-show { transform: translateY(0) !important; }

        /* Typography Quran */
        .arab-block { direction: rtl; text-align: right; line-height: 3.2; word-spacing: 4px; }
        .ayah-text { font-family: 'Uthmanic', serif; font-size: 2.2rem; color: #1e293b; text-rendering: optimizeLegibility; }
        .bismillah-text { font-family: 'Uthmanic', serif; font-size: 2.5rem; color: #0d9488; text-align: center; margin: 20px 0 30px 0; }
        .ayah-number-inline { 
            font-family: 'Uthmanic', serif; font-size: 0.5em; color: #0d9488; border: 1.5px solid #dcfce7; background: #f0fdf4;
            width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center;
            border-radius: 50%; vertical-align: middle; margin-right: 12px; transform: translateY(-3px); font-weight: bold;
        }

        .latin-block { direction: ltr; text-align: left; border-left: 3px solid #0d9488; padding-left: 15px; margin-top: 15px; }
        .audio-btn { width: 36px; height: 36px; border-radius: 50%; background: #f1f5f9; color: #0d9488; display: flex; align-items: center; justify-content: center; border: 1px solid #e2e8f0; }
        .audio-playing { background-color: #f0fdf4 !important; border-color: #86efac !important; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-bg">
            <div onclick="toggleLocationSheet()" class="location-capsule">
                <i class="fa-solid fa-location-dot text-white text-[10px]"></i>
                <span id="location-text" class="text-[11px] font-semibold text-white truncate max-w-[150px]">Mencari Lokasi...</span>
                <i class="fa-solid fa-chevron-down text-white/50 text-[9px]"></i>
            </div>

            <div class="info-capsule">
                <div class="flex items-center justify-between">
                    <div class="flex-1 text-center border-r border-slate-100">
                        <p id="prayer-name" class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-1">---</p>
                        <h2 id="prayer-time" class="text-4xl font-bold text-slate-800 tracking-tight leading-none">--:--</h2>
                    </div>
                    <div class="flex-1 text-center">
                        <p class="text-[10px] text-red-400 font-bold uppercase tracking-[0.15em] mb-1">Mendatang</p>
                        <span id="countdown" class="text-xl font-semibold text-slate-700 font-mono tracking-tighter">-00:00:00</span>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-slate-50 text-center">
                    <p id="full-date" class="text-[11px] font-medium text-slate-500 mb-1"></p>
                    <p id="java-hijri" class="text-xs text-teal-600 font-semibold tracking-tight"></p>
                </div>
            </div>
        </div>

        <div class="mt-28 grid grid-cols-2 gap-4 p-6">
            <div class="bg-white border rounded-2xl p-6 text-center shadow-sm active:scale-95 transition-all cursor-pointer"><i class="fa-solid fa-mosque text-teal-600 mb-2 text-xl"></i><p class="text-[10px] font-bold uppercase">Profil</p></div>
            <div class="bg-white border rounded-2xl p-6 text-center shadow-sm active:scale-95 transition-all cursor-pointer"><i class="fa-solid fa-book-open text-blue-600 mb-2 text-xl"></i><p class="text-[10px] font-bold uppercase">Kegiatan</p></div>
        </div>

        <nav class="bottom-nav">
            <a onclick="location.reload()" class="nav-item active"><i class="fa-solid fa-house-chimney"></i><span>Beranda</span></a>
            <a onclick="toggleQuran()" class="nav-item"><i class="fa-solid fa-book-quran"></i><span>Quran</span></a>
            <a onclick="alert('Fitur segera hadir')" class="nav-item"><i class="fa-solid fa-calendar-days"></i><span>Jadwal</span></a>
            <a onclick="alert('Fitur segera hadir')" class="nav-item"><i class="fa-solid fa-hands-praying"></i><span>Doa</span></a>
        </nav>
    </div>

    <div id="quran-modal" class="modal-full">
        <div class="bg-teal-700 p-5 text-white flex justify-between items-center">
            <button onclick="toggleQuran()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="text-center">
                <h2 id="surah-title" class="font-bold text-xs uppercase tracking-widest">Al-Quran</h2>
                <p id="surah-subtitle" class="text-[8px] opacity-70 mt-1 uppercase"></p>
            </div>
            <button onclick="toggleTranslation()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-language"></i></button>
        </div>
        <div id="quran-content" class="flex-1 overflow-y-auto p-4 bg-white pb-24"></div>
    </div>

    <div id="location-sheet-bg" onclick="toggleLocationSheet()" class="fixed inset-0 bg-slate-900/40 z-[250] hidden opacity-0 transition-opacity backdrop-blur-sm"></div>
    <div id="location-sheet" class="fixed bottom-0 left-0 right-0 bg-white z-[300] rounded-t-[32px] p-8 translate-y-full transition-transform duration-500 max-w-[500px] mx-auto shadow-2xl">
        <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-8"></div>
        <h3 class="text-center text-lg font-bold text-slate-800 mb-6 uppercase">Atur Lokasi</h3>
        <div class="space-y-4">
            <button onclick="getGPSLocation(); toggleLocationSheet()" class="w-full flex items-center gap-4 p-4 rounded-2xl bg-teal-50 text-teal-700 font-bold active:scale-95 transition-all"><i class="fa-solid fa-crosshairs text-lg"></i><span>Gunakan GPS Otomatis</span></button>
            <div class="relative"><input type="text" id="manual-city" placeholder="Nama Kota (Manual)..." class="w-full p-4 pl-12 rounded-2xl bg-slate-50 text-sm border-none focus:ring-2 focus:ring-teal-500 font-medium uppercase"><i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i></div>
            <button onclick="handleManualCity()" class="w-full p-4 bg-slate-800 text-white rounded-2xl font-bold text-sm">Simpan Kota</button>
        </div>
    </div>

    <script>
        let nextPrayerTime = null;
        let currentAudio = null;
        let currentAyahIndex = -1;
        let ayahList = [];
        let isTranslationVisible = true;

        // Navigation fix
        window.addEventListener('popstate', () => {
            document.querySelectorAll('.modal-full').forEach(m => m.classList.remove('modal-show'));
            document.getElementById('location-sheet').classList.add('translate-y-full');
            document.getElementById('location-sheet-bg').classList.add('hidden');
            stopAudio();
        });

        function toggleQuran() {
            const el = document.getElementById('quran-modal');
            if (!el.classList.contains('modal-show')) {
                el.classList.add('modal-show'); loadSurahList(); history.pushState({m:'q'},'','#q');
            } else { history.back(); }
        }

        function toggleLocationSheet() {
            const sheet = document.getElementById('location-sheet');
            const bg = document.getElementById('location-sheet-bg');
            if (sheet.classList.contains('translate-y-full')) {
                sheet.classList.remove('translate-y-full');
                bg.classList.remove('hidden');
                setTimeout(() => bg.classList.add('opacity-100'), 10);
                history.pushState({m:'l'},'','#l');
            } else { history.back(); }
        }

        function toArabicNumber(n) {
            const forms = ['\u0660', '\u0661', '\u0662', '\u0663', '\u0664', '\u0665', '\u0666', '\u0667', '\u0668', '\u0669'];
            return String(n).split('').map(c => forms[Number(c)]).join('');
        }

        function toggleTranslation() {
            isTranslationVisible = !isTranslationVisible;
            document.querySelectorAll('.translation-text').forEach(el => el.classList.toggle('hidden', !isTranslationVisible));
        }

        async function loadSurahList() {
            const c = document.getElementById('quran-content');
            c.innerHTML = `<div class="text-center py-20 text-teal-600 font-bold">Memuat Surah...</div>`;
            try {
                const r = await fetch('https://equran.id/api/v2/surat');
                const j = await r.json();
                let html = '<div class="space-y-3">';
                j.data.forEach(s => {
                    html += `<div onclick="loadDetailSurah(${s.nomor})" class="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm active:scale-95 transition-all">
                        <div class="flex items-center gap-4">
                            <span class="w-10 h-10 bg-teal-50 text-teal-700 rounded-xl flex items-center justify-center text-xs font-bold">${s.nomor}</span>
                            <div><h4 class="font-bold text-sm text-slate-700 uppercase">${s.namaLatin}</h4><p class="text-[9px] text-slate-400 font-bold">${s.arti} • ${s.jumlahAyat} Ayat</p></div>
                        </div>
                        <span class="ayah-text text-2xl text-teal-600">${s.nama}</span>
                    </div>`;
                });
                c.innerHTML = html + '</div>';
            } catch (e) { c.innerHTML = 'Gagal memuat.'; }
        }

        async function loadDetailSurah(n) {
            const c = document.getElementById('quran-content');
            c.innerHTML = `<div class="text-center py-20 text-teal-600 font-bold animate-pulse">Memuat Ayat...</div>`;
            try {
                const r = await fetch(`https://equran.id/api/v2/surat/${n}`);
                const j = await r.json();
                const s = j.data; ayahList = s.ayat;
                document.getElementById('surah-title').innerText = s.namaLatin;
                document.getElementById('surah-subtitle').innerText = `${s.arti} • ${s.jumlahAyat} Ayat`;

                let html = (n != 9 && n != 1) ? `<div class="bismillah-text">بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ</div>` : '';
                
                ayahList.forEach((a, i) => {
                    let teks = a.teksArab;
                    if (n != 1 && n != 9 && i == 0) {
                        teks = teks.replace('بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ', '').replace('بِسْمِ اللّٰهِ الرَّحْمٰنِ الرَّحِيْمِ', '');
                    }

                    html += `
                    <div id="ayah-box-${i}" class="p-6 bg-white border-b border-slate-50 transition-all">
                        <div class="arab-block">
                            <span class="ayah-text">${teks} <span class="ayah-number-inline">${toArabicNumber(a.nomorAyat)}</span></span>
                        </div>
                        <div class="latin-block translation-text ${isTranslationVisible ? '' : 'hidden'}">
                            <p class="text-[12px] text-teal-600 font-bold mb-1 italic leading-relaxed">${a.teksLatin}</p>
                            <p class="text-sm text-slate-500 leading-relaxed font-medium">${a.teksIndonesia}</p>
                        </div>
                        <div class="mt-4"><button onclick="playAudio(${i})" id="audio-btn-${i}" class="audio-btn"><i class="fa-solid fa-play text-[10px]"></i></button></div>
                    </div>`;
                });
                c.innerHTML = html + `<button onclick="loadSurahList()" class="w-full mt-6 py-5 bg-teal-50 text-teal-700 rounded-3xl font-bold text-[10px] uppercase">Kembali ke Daftar Surah</button>`;
                c.scrollTo(0,0);
            } catch (e) { c.innerHTML = 'Gagal memuat.'; }
        }

        function playAudio(i) {
            if (currentAudio && currentAyahIndex === i) { stopAudio(); return; }
            stopAudio(); currentAyahIndex = i;
            currentAudio = new Audio(ayahList[i].audio['01']);
            document.getElementById(`audio-btn-${i}`).innerHTML = '<i class="fa-solid fa-pause text-[10px]"></i>';
            document.getElementById(`ayah-box-${i}`).classList.add('audio-playing');
            currentAudio.play();
            currentAudio.onended = () => { if (currentAyahIndex < ayahList.length - 1) playAudio(currentAyahIndex + 1); else stopAudio(); };
        }

        function stopAudio() {
            if (currentAudio) {
                currentAudio.pause();
                const btn = document.getElementById(`audio-btn-${currentAyahIndex}`);
                if(btn) btn.innerHTML = '<i class="fa-solid fa-play text-[10px]"></i>';
                const box = document.getElementById(`ayah-box-${currentAyahIndex}`);
                if(box) box.classList.remove('audio-playing');
            }
            currentAudio = null;
        }

        // --- Location & Prayer Logic ---
        function handleManualCity() {
            const city = document.getElementById('manual-city').value;
            if(city) {
                document.getElementById('location-text').innerText = city;
                fetch(`https://api.aladhan.com/v1/timingsByCity?city=${city}&country=Indonesia&method=11`)
                .then(r => r.json()).then(j => setPrayerUI(j.data.timings));
                toggleLocationSheet();
            }
        }

        async function getGPSLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    const lRes = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`);
                    const lData = await lRes.json();
                    const locName = lData.address.city || lData.address.town || lData.address.village || "Lokasi GPS";
                    document.getElementById('location-text').innerText = locName;
                    
                    const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                    const json = await res.json(); 
                    setPrayerUI(json.data.timings);
                });
            }
        }

        function setPrayerUI(t) {
            const now = new Date();
            const cur = (now.getHours() * 60) + now.getMinutes();
            const s = [{n:'Subuh', t:t.Fajr}, {n:'Dzuhur', t:t.Dhuhr}, {n:'Ashar', t:t.Asr}, {n:'Maghrib', t:t.Maghrib}, {n:'Isya', t:t.Isha}];
            let next = s.find(x => (parseInt(x.t.split(':')[0])*60 + parseInt(x.t.split(':')[1])) > cur) || s[0];
            document.getElementById('prayer-name').innerText = next.n;
            document.getElementById('prayer-time').innerText = next.t;
            const [nH, nM] = next.t.split(':'); nextPrayerTime = new Date(); nextPrayerTime.setHours(nH, nM, 0);
            if (nextPrayerTime < now) nextPrayerTime.setDate(nextPrayerTime.getDate() + 1);
        }

        // --- App Start ---
        const ds = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const ms = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        const now = new Date();
        document.getElementById('full-date').innerText = `${ds[now.getDay()]}, ${now.getDate()} ${ms[now.getMonth()]} ${now.getFullYear()} M`;

        setInterval(() => {
            if (!nextPrayerTime) return;
            const diff = nextPrayerTime - new Date();
            const h = Math.floor(diff/3600000).toString().padStart(2,'0');
            const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
            const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById('countdown').innerText = `-${h}:${m}:${s}`;
        }, 1000);

        getGPSLocation();
    </script>
</body>
</html>
