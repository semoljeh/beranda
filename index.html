<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; margin:0; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; background-color: white; min-height: 100vh; position: relative; padding-bottom: 120px; }
        
        /* HEADER TEAL (#0d9488) */
        .header-bg { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); height: 200px; border-radius: 0 0 40px 40px; padding: 40px 25px; color: white; }
        
        /* MODAL SYSTEM */
        .modal-full { position: fixed; inset: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }
        .modal-show { transform: translateY(0) !important; }
        .teal-header { background-color: #0d9488; color: white; padding: 20px; display: flex; justify-content: space-between; align-items: center; }

        /* CALENDAR GRID */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; padding: 10px; }
        .calendar-box { 
            aspect-ratio: 1/1.2; background: #fff; border: 1px solid #f1f5f9; border-radius: 12px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .date-masehi { font-size: 14px; font-weight: 700; color: #1e293b; }
        .date-hijri { font-size: 8px; color: #0d9488; font-weight: 600; margin-top: 2px; }
        .date-weton { font-size: 7px; color: #94a3b8; font-weight: 700; text-transform: uppercase; }
        
        /* HIGHLIGHTS */
        .is-today { background: #0d9488 !important; border-color: #0d9488; color: white !important; }
        .is-today span { color: white !important; }
        .is-holiday, .is-sunday { color: #ef4444 !important; background-color: #fff1f2; }
        .is-holiday .date-masehi, .is-sunday .date-masehi { color: #ef4444; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: white; display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid #f1f5f9; z-index: 100; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-bg">
            <h1 class="text-2xl font-bold">Portal Darussalam</h1>
            <p class="text-xs opacity-80 mt-1">Sistem Informasi Madrasah Digital</p>
            <div onclick="App.toggleCalendar()" class="mt-6 bg-white/20 p-4 rounded-2xl flex justify-between items-center cursor-pointer border border-white/10">
                <span class="text-xs font-bold"><i class="fa-solid fa-calendar-day mr-2"></i> Lihat Kalender Lengkap</span>
                <i class="fa-solid fa-chevron-right text-[10px]"></i>
            </div>
        </div>

        <nav class="bottom-nav">
            <a onclick="location.reload()" class="flex flex-col items-center text-teal-600 font-bold"><i class="fa-solid fa-house"></i><span class="text-[10px] mt-1">BERANDA</span></a>
            <a onclick="App.toggleCalendar()" class="flex flex-col items-center text-slate-400 font-bold"><i class="fa-solid fa-calendar"></i><span class="text-[10px] mt-1">KALENDER</span></a>
        </nav>
    </div>

    <div id="calendar-modal" class="modal-full">
        <div class="teal-header">
            <button onclick="App.toggleCalendar()"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="text-center">
                <h2 id="cal-month-name" class="font-bold text-sm uppercase tracking-widest">---</h2>
                <p class="text-[9px] opacity-80 uppercase font-bold">Nasional, Hijriyah & Weton</p>
            </div>
            <div class="flex gap-4">
                <button onclick="Calendar.changeMonth(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <button onclick="Calendar.changeMonth(1)"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="flex-1 overflow-y-auto bg-white pb-32">
            <div class="calendar-grid text-[10px] font-extrabold text-slate-400 text-center mb-1">
                <div class="text-red-500">MIN</div><div>SEN</div><div>SEL</div><div>RAB</div><div>KAM</div><div class="text-teal-600">JUM</div><div>SAB</div>
            </div>
            <div id="calendar-main-grid" class="calendar-grid"></div>
            
            <div class="px-6 mt-6">
                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-4">Keterangan Spesial</h3>
                <div id="holiday-info" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <script>
        const App = {
            toggleCalendar() { 
                const el = document.getElementById('calendar-modal');
                el.classList.toggle('modal-show');
                if(el.classList.contains('modal-show')) Calendar.init();
            }
        };

        const Calendar = {
            curDate: new Date(),
            holidays: {},
            hijriCache: {},

            async init() {
                const grid = document.getElementById('calendar-main-grid');
                grid.innerHTML = '<div class="col-span-7 text-center py-20 text-xs text-slate-400">Sinkronisasi Data...</div>';
                
                await this.fetchHolidays();
                await this.fetchMonthHijri();
                this.render();
            },

            async fetchHolidays() {
                const year = this.curDate.getFullYear();
                try {
                    const res = await fetch(`https://api-harilibur.vercel.app/api?year=${year}`);
                    const data = await res.json();
                    this.holidays = {};
                    data.forEach(h => { this.holidays[h.holiday_date] = h.holiday_name; });
                } catch (e) { console.error("Gagal load libur"); }
            },

            async fetchMonthHijri() {
                const m = this.curDate.getMonth() + 1;
                const y = this.curDate.getFullYear();
                try {
                    // Menggunakan endpoint Calendar untuk menarik data satu bulan sekaligus agar efisien
                    const res = await fetch(`https://api.aladhan.com/v1/gToHCalendar/${m}/${y}`);
                    const json = await res.json();
                    this.hijriCache = {};
                    json.data.forEach(d => {
                        this.hijriCache[parseInt(d.gregorian.day)] = d.hijri.day;
                    });
                } catch (e) { console.error("Gagal load Hijri"); }
            },

            getPasaran(date) {
                const weton = ['Legi', 'Pahing', 'Pon', 'Wage', 'Kliwon'];
                const diff = Math.floor((date - new Date(1900, 0, 1)) / 86400000);
                return weton[(diff + 1) % 5];
            },

            render() {
                const grid = document.getElementById('calendar-main-grid');
                const info = document.getElementById('holiday-info');
                grid.innerHTML = ''; info.innerHTML = '';
                
                const y = this.curDate.getFullYear(), m = this.curDate.getMonth();
                const start = new Date(y, m, 1).getDay(), total = new Date(y, m + 1, 0).getDate();
                const monthNames = ["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
                
                document.getElementById('cal-month-name').innerText = `${monthNames[m]} ${y}`;

                for (let i = 0; i < start; i++) grid.innerHTML += '<div></div>';

                for (let d = 1; d <= total; d++) {
                    const date = new Date(y, m, d);
                    const dateKey = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    const libur = this.holidays[dateKey];
                    const isToday = date.toDateString() === new Date().toDateString();
                    const hDay = this.hijriCache[d] || '?';

                    grid.innerHTML += `
                        <div class="calendar-box ${isToday ? 'is-today' : ''} ${libur || date.getDay() === 0 ? 'is-holiday' : ''}">
                            <span class="date-masehi">${d}</span>
                            <span class="date-hijri">${hDay}</span>
                            <span class="date-weton">${this.getPasaran(date)}</span>
                        </div>`;

                    if (libur) {
                        info.innerHTML += `
                            <div class="flex gap-4 p-4 bg-red-50 rounded-2xl border border-red-100">
                                <div class="w-10 h-10 bg-red-500 text-white rounded-xl flex items-center justify-center font-bold shrink-0 text-sm">${d}</div>
                                <div>
                                    <p class="text-[9px] text-red-500 font-bold uppercase tracking-wider">Libur Nasional</p>
                                    <p class="text-xs font-bold text-slate-800 leading-tight">${libur}</p>
                                </div>
                            </div>`;
                    }
                }
                if(info.innerHTML === "") info.innerHTML = '<p class="text-[11px] text-slate-400 italic">Tidak ada hari libur nasional bulan ini.</p>';
            },
            changeMonth(v) { this.curDate.setMonth(this.curDate.getMonth() + v); this.init(); }
        };
    </script>
</body>
</html>
