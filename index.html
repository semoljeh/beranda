<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Darussalam">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/semoljeh/link/main/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        /* Menggunakan Font Khat Utsmani (Me Quran / Madinah) */
        @font-face {
            font-family: 'Uthmani';
            src: url('https://pagedemos.com/fonts/me_quran.ttf'); /* Link Font Khat Utsmani Standar */
        }

        .font-arab { font-family: 'Uthmani', serif; }
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; margin:0; color: #1e293b; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; background-color: white; min-height: 100vh; position: relative; padding-bottom: 120px; }
        
        /* Header */
        .header-bg { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); height: 220px; border-radius: 0 0 40px 40px; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
        .location-capsule { display: flex; align-items: center; gap: 6px; background-color: rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; backdrop-filter: blur(4px); }
        .info-capsule { position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%); width: 90%; background: white; border-radius: 30px; padding: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; z-index: 20; }

        /* Navigasi */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0 28px 0; border-top: 1px solid #f1f5f9; z-index: 100; }
        .nav-item { color: #0d9488; opacity: 0.6; transition: all 0.2s ease; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-weight: 500; }
        .nav-item.active { opacity: 1; font-weight: 700; }

        /* Modal */
        .modal-full { position: fixed; inset: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }
        .modal-show { transform: translateY(0) !important; }

        /* Typography Khat Utsmani */
        .arab-block { 
            direction: rtl; 
            text-align: right; 
            line-height: 2.6; 
            word-spacing: 2px;
            margin-bottom: 10px;
        }
        
        .ayah-number-inline { 
            font-family: 'Inter', sans-serif; /* Angka latin lebih bersih untuk nomor ayat Utsmani */
            font-size: 11px;
            color: #94a3b8; 
            border: 1px solid #e2e8f0;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            vertical-align: middle;
            margin-right: 8px;
            transform: translateY(-2px);
        }

        .latin-block {
            direction: ltr;
            text-align: left;
        }
        
        .audio-playing { background-color: #f0fdf4 !important; border-left: 4px solid #0d9488 !important; }
        .audio-btn { width: 34px; height: 34px; border-radius: 50%; background: #f1f5f9; color: #0d9488; display: flex; align-items: center; justify-content: center; border: 1px solid #e2e8f0; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-bg">
            <div onclick="toggleLocationSheet()" class="location-capsule">
                <i class="fa-solid fa-location-dot text-white text-[10px]"></i>
                <span id="location-text" class="text-[11px] font-semibold text-white tracking-tight">Cari Lokasi...</span>
            </div>

            <div class="info-capsule">
                <div class="flex items-center justify-between">
                    <div class="flex-1 text-center border-r border-slate-100">
                        <p id="prayer-name" class="text-[10px] text-slate-400 font-bold uppercase tracking-[0.2em] mb-1">---</p>
                        <h2 id="prayer-time" class="text-4xl font-bold text-slate-800 tracking-tight leading-none">--:--</h2>
                    </div>
                    <div class="flex-1 text-center">
                        <p class="text-[10px] text-red-400 font-bold uppercase tracking-[0.15em] mb-1">Mendatang</p>
                        <span id="countdown" class="text-xl font-semibold text-slate-700 font-mono tracking-tighter">-00:00:00</span>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-slate-50 text-center">
                    <p id="full-date" class="text-[11px] font-medium text-slate-500 mb-1"></p>
                    <p id="java-hijri" class="text-xs text-teal-600 font-semibold tracking-tight"></p>
                </div>
            </div>
        </div>

        <div class="mt-28 grid grid-cols-2 gap-4 p-6">
            <div class="bg-white border rounded-2xl p-6 text-center shadow-sm"><i class="fa-solid fa-mosque text-teal-600 mb-2 text-xl"></i><p class="text-[10px] font-bold uppercase">Profil</p></div>
            <div class="bg-white border rounded-2xl p-6 text-center shadow-sm"><i class="fa-solid fa-book-open text-blue-600 mb-2 text-xl"></i><p class="text-[10px] font-bold uppercase">Kegiatan</p></div>
        </div>

        <nav class="bottom-nav">
            <a onclick="location.reload()" class="nav-item active"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[10px] mt-1">Beranda</span></a>
            <a onclick="toggleQuran()" class="nav-item"><i class="fa-solid fa-book-quran text-xl"></i><span class="text-[10px] mt-1">Quran</span></a>
            <a onclick="alert('Fitur segera hadir')" class="nav-item"><i class="fa-solid fa-calendar-days text-xl"></i><span class="text-[10px] mt-1">Kalender</span></a>
            <a onclick="alert('Fitur segera hadir')" class="nav-item"><i class="fa-solid fa-hands-praying text-xl"></i><span class="text-[10px] mt-1">Doa</span></a>
        </nav>
    </div>

    <div id="quran-modal" class="modal-full">
        <div class="bg-teal-700 p-5 text-white flex justify-between items-center shadow-md">
            <button onclick="toggleQuran()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-arrow-left"></i></button>
            <div class="text-center">
                <h2 id="surah-title" class="font-bold text-xs uppercase tracking-widest leading-none">Al-Quran</h2>
                <p id="surah-subtitle" class="text-[8px] opacity-70 mt-1"></p>
            </div>
            <button onclick="toggleTranslation()" class="p-2 bg-white/10 rounded-xl"><i class="fa-solid fa-language"></i></button>
        </div>
        <div id="quran-content" class="flex-1 overflow-y-auto p-0 bg-white pb-24"></div>
    </div>

    <script>
        let currentAudio = null;
        let currentAyahIndex = -1;
        let ayahList = [];
        let isTranslationVisible = true;
        let nextPrayerTime = null;

        window.addEventListener('popstate', () => {
            document.querySelectorAll('.modal-full').forEach(m => m.classList.remove('modal-show'));
            stopAudio();
        });

        function toggleQuran() {
            const el = document.getElementById('quran-modal');
            if (!el.classList.contains('modal-show')) {
                el.classList.add('modal-show'); loadSurahList(); history.pushState({m:'q'},'','#q');
            } else { history.back(); }
        }

        function toggleTranslation() {
            isTranslationVisible = !isTranslationVisible;
            document.querySelectorAll('.translation-text').forEach(el => el.classList.toggle('hidden', !isTranslationVisible));
        }

        async function loadSurahList() {
            const c = document.getElementById('quran-content');
            c.innerHTML = `<div class="text-center py-20 animate-pulse text-teal-600 font-bold">Memuat Surah...</div>`;
            try {
                const r = await fetch('https://equran.id/api/v2/surat');
                const j = await r.json();
                let html = '<div class="p-4 space-y-3">';
                j.data.forEach(s => {
                    html += `<div onclick="loadDetailSurah(${s.nomor})" class="bg-white p-4 rounded-xl border border-slate-100 flex justify-between items-center active:scale-95 transition-all shadow-sm">
                        <div class="flex items-center gap-4">
                            <span class="w-8 h-8 bg-slate-50 text-slate-400 rounded-lg flex items-center justify-center text-[10px] font-bold">${s.nomor}</span>
                            <div><h4 class="font-bold text-sm text-slate-700">${s.namaLatin}</h4><p class="text-[9px] text-slate-400 uppercase font-bold">${s.arti} • ${s.jumlahAyat} Ayat</p></div>
                        </div>
                        <span class="font-arab text-2xl text-slate-800">${s.nama}</span>
                    </div>`;
                });
                c.innerHTML = html + '</div>';
            } catch (e) { c.innerHTML = '<p class="text-center p-10">Gagal memuat data.</p>'; }
        }

        async function loadDetailSurah(n) {
            const c = document.getElementById('quran-content');
            c.innerHTML = `<div class="text-center py-20 animate-pulse text-teal-600 font-bold">Memuat Ayat...</div>`;
            try {
                const r = await fetch(`https://equran.id/api/v2/surat/${n}`);
                const j = await r.json();
                const s = j.data; ayahList = s.ayat;
                document.getElementById('surah-title').innerText = s.namaLatin;
                document.getElementById('surah-subtitle').innerText = `${s.jumlahAyat} AYAT • ${s.tempatTurun}`;

                let html = `<div class="p-0">`;
                ayahList.forEach((a, i) => {
                    html += `
                    <div id="ayah-box-${i}" class="p-6 border-b border-slate-50 transition-all">
                        <div class="arab-block">
                            <span class="font-arab text-3xl text-slate-800 leading-[2.6]">
                                ${a.teksArab}
                                <span class="ayah-number-inline">${a.nomorAyat}</span>
                            </span>
                        </div>
                        <div class="latin-block mt-4 translation-text ${isTranslationVisible ? '' : 'hidden'}">
                            <p class="text-[12px] text-teal-600 font-semibold mb-1 italic">${a.teksLatin}</p>
                            <p class="text-sm text-slate-500 leading-relaxed font-medium">${a.teksIndonesia}</p>
                        </div>
                        <div class="mt-4"><button onclick="playAudio(${i})" id="audio-btn-${i}" class="audio-btn"><i class="fa-solid fa-play text-[10px]"></i></button></div>
                    </div>`;
                });
                c.innerHTML = html + `</div>`;
                c.scrollTo(0,0);
            } catch (e) { c.innerHTML = '<p class="text-center p-10">Gagal memuat ayat.</p>'; }
        }

        function playAudio(i) {
            if (currentAudio && currentAyahIndex === i) { stopAudio(); return; }
            stopAudio(); currentAyahIndex = i;
            currentAudio = new Audio(ayahList[i].audio['01']);
            document.getElementById(`audio-btn-${i}`).innerHTML = '<i class="fa-solid fa-pause text-[10px]"></i>';
            document.getElementById(`ayah-box-${i}`).classList.add('audio-playing');
            currentAudio.play();
            currentAudio.onended = () => { if (currentAyahIndex < ayahList.length - 1) playAudio(currentAyahIndex + 1); else stopAudio(); };
        }

        function stopAudio() {
            if (currentAudio) {
                currentAudio.pause();
                const btn = document.getElementById(`audio-btn-${currentAyahIndex}`);
                if(btn) btn.innerHTML = '<i class="fa-solid fa-play text-[10px]"></i>';
                const box = document.getElementById(`ayah-box-${currentAyahIndex}`);
                if(box) box.classList.remove('audio-playing');
            }
            currentAudio = null;
        }

        async function getCoreData() {
            const now = new Date();
            const ds = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const ms = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('full-date').innerText = `${ds[now.getDay()]}, ${now.getDate()} ${ms[now.getMonth()]} ${now.getFullYear()} M`;

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const { latitude: lat, longitude: lon } = pos.coords;
                    const res = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                    const json = await res.json();
                    document.getElementById('location-text').innerText = "Lokasi Terdeteksi";
                    setPrayerUI(json.data.timings);
                    document.getElementById('java-hijri').innerText = `${json.data.date.hijri.day} ${json.data.date.hijri.month.en} ${json.data.date.hijri.year} H`;
                }, () => { document.getElementById('location-text').innerText = "Lokasi Default"; });
            }
        }

        function setPrayerUI(t) {
            const now = new Date();
            const cur = (now.getHours() * 60) + now.getMinutes();
            const s = [{n:'Subuh', t:t.Fajr}, {n:'Dzuhur', t:t.Dhuhr}, {n:'Ashar', t:t.Asr}, {n:'Maghrib', t:t.Maghrib}, {n:'Isya', t:t.Isha}];
            let next = s.find(x => (parseInt(x.t.split(':')[0])*60 + parseInt(x.t.split(':')[1])) > cur) || s[0];
            document.getElementById('prayer-name').innerText = next.n;
            document.getElementById('prayer-time').innerText = next.t;
            const [nH, nM] = next.t.split(':'); nextPrayerTime = new Date(); nextPrayerTime.setHours(nH, nM, 0);
            if (nextPrayerTime < now) nextPrayerTime.setDate(nextPrayerTime.getDate() + 1);
        }

        setInterval(() => {
            if (!nextPrayerTime) return;
            const diff = nextPrayerTime - new Date();
            const h = Math.floor(diff/3600000).toString().padStart(2,'0');
            const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
            const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
            document.getElementById('countdown').innerText = `-${h}:${m}:${s}`;
        }, 1000);

        getCoreData();
    </script>
</body>
</html>
