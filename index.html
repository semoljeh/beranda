<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0fdfa; /* Background kehijauan sangat muda */
            margin: 0;
            display: flex;
            justify-content: center;
        }

        /* Container Utama agar terlihat seperti aplikasi mobile di desktop */
        .app-container {
            width: 100%;
            max-width: 500px;
            background-color: white;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.05);
            padding-bottom: 80px;
        }

        /* Header Melengkung Lebar */
        .header-bg {
            background-color: #0d9488; /* Teal color sesuai gambar */
            height: 250px;
            border-radius: 0 0 40px 40px;
            position: relative;
        }

        /* Foto Profil Melingkar di Tengah */
        .profile-wrapper {
            position: absolute;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
        }

        .profile-img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid white;
            background-color: #e2e8f0;
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Card Menu (2 Kolom) */
        .menu-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            border: 1px solid #f1f5f9;
            transition: transform 0.2s;
        }

        .menu-card:active {
            transform: scale(0.95);
        }

        .footer-text {
            color: #0d9488;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-bg">
            <div class="profile-wrapper">
                <img src="https://via.placeholder.com/150" alt="Logo" class="profile-img">
            </div>
        </div>

        <div class="mt-14 text-center px-6">
            <h1 class="text-xl font-bold text-teal-800">Nama Pondok</h1>
            <p class="text-xs text-gray-500 mt-1">Pesantren modern berbasis Al-Qur'an dan Sunnah</p>
        </div>

        <div class="grid grid-cols-2 gap-4 p-6 mt-4">
            <div class="menu-card">
                <i class="fa-solid fa-mosque text-3xl text-emerald-700 mb-3"></i>
                <span class="text-[13px] font-semibold text-gray-700">Profil Madrasah</span>
            </div>
            <div class="menu-card">
                <i class="fa-solid fa-book-open text-3xl text-blue-700 mb-3"></i>
                <span class="text-[13px] font-semibold text-gray-700">Kegiatan Santri</span>
            </div>
            <div class="menu-card">
                <i class="fa-solid fa-file-signature text-3xl text-gray-700 mb-3"></i>
                <span class="text-[13px] font-semibold text-gray-700">Pendaftaran</span>
            </div>
            <div class="menu-card">
                <i class="fa-solid fa-heart-pulse text-3xl text-red-600 mb-3"></i>
                <span class="text-[13px] font-semibold text-gray-700">Program Donasi</span>
            </div>
        </div>

        <div class="fixed bottom-24 right-6 md:right-[calc(50%-230px)]">
            <div class="bg-teal-800 w-12 h-12 rounded-full flex items-center justify-center text-yellow-400 shadow-lg border-2 border-white">
                <i class="fa-solid fa-moon text-xl"></i>
            </div>
        </div>

        <footer class="mt-10 mb-10 text-center border-t pt-6 mx-6">
            <p class="footer-text uppercase tracking-widest">Darussalam</p>
            <p class="text-[10px] text-gray-400 mt-1">© 2026 All Rights Reserved</p>
        </footer>
    </div>

</body>
</html>
