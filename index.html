<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Darussalam</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d9488">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Darussalam">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/semoljeh/link/main/icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        @font-face { font-family: 'LPMQ'; src: url('https://kemenag.go.id/assets/fonts/lpmq.ttf'); }
        
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; display: flex; justify-content: center; margin:0; color: #1e293b; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 500px; background-color: white; min-height: 100vh; position: relative; padding-bottom: 120px; }
        
        .modal-full { position: fixed; inset: 0; background: white; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 200; display: flex; flex-direction: column; max-width: 500px; margin: 0 auto; }
        .modal-show { transform: translateY(0) !important; }

        /* Custom Style for Search results */
        .search-item { padding: 14px 20px; border-bottom: 1px solid #f1f5f9; cursor: pointer; transition: all 0.2s; }
        .search-item:hover { background-color: #f0fdfa; }
        .search-item p { font-size: 11px; color: #334155; font-weight: 600; text-transform: uppercase; margin: 0; }
        .search-item span { font-size: 9px; color: #94a3b8; }
    </style>

    <script>
        // Global Navigation Engine
        window.addEventListener('popstate', function () {
            document.querySelectorAll('.modal-full').forEach(m => m.classList.remove('modal-show'));
            // Close Location Sheet
            const sheet = document.getElementById('location-sheet');
            const bg = document.getElementById('location-sheet-bg');
            if (sheet && !sheet.classList.contains('translate-y-full')) {
                sheet.classList.add('translate-y-full');
                bg.classList.remove('opacity-100');
                setTimeout(() => bg.classList.add('hidden'), 300);
            }
            if(typeof stopAudio === "function") stopAudio();
        });
        function pushState(n) { history.pushState({modal: n}, n, "#"+n); }
    </script>
</head>
<body>

    <div class="app-container">

        <section id="module-header">
            <style>
                .header-bg { background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%); height: 220px; border-radius: 0 0 40px 40px; position: relative; display: flex; flex-direction: column; align-items: center; padding-top: 40px; }
                .location-capsule { display: flex; align-items: center; gap: 6px; background-color: rgba(255,255,255,0.15); padding: 8px 14px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; backdrop-filter: blur(4px); transition: transform 0.2s; }
                .info-capsule { position: absolute; bottom: -70px; left: 50%; transform: translateX(-50%); width: 90%; background: white; border-radius: 30px; padding: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); border: 1px solid #f1f5f9; z-index: 20; }
            </style>

            <div class="header-bg">
                <div onclick="toggleLocationSheet()" class="location-capsule">
                    <i class="fa-solid fa-location-dot text-white text-[10px]"></i>
                    <span id="location-text" class="text-[11px] font-semibold text-white truncate max-w-[150px]">Mencari Lokasi...</span>
                    <i class="fa-solid fa-chevron-down text-white/50 text-[9px]"></i>
                </div>
                <div class="info-capsule">
                    <div class="flex items-center justify-between">
                        <div class="flex-1 text-center border-r border-slate-100">
                            <p id="prayer-name" class="text-[10px] text-slate-400 font-bold uppercase mb-1">---</p>
                            <h2 id="prayer-time" class="text-4xl font-bold text-slate-800 tracking-tight leading-none">--:--</h2>
                        </div>
                        <div class="flex-1 text-center">
                            <p class="text-[10px] text-red-400 font-bold uppercase mb-1">Mendatang</p>
                            <span id="countdown" class="text-xl font-semibold text-slate-700 font-mono tracking-tighter">-00:00:00</span>
                        </div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-slate-50 text-center">
                        <p id="full-date" class="text-[11px] font-medium text-slate-500 mb-1"></p>
                        <p id="java-hijri" class="text-xs text-teal-600 font-semibold tracking-tight"></p>
                    </div>
                </div>
            </div>

            <script>
                let nextPrayerTime = null;
                
                function setPrayerUI(t) {
                    const now = new Date(); const cur = (now.getHours() * 60) + now.getMinutes();
                    const s = [{n:'Subuh', t:t.Fajr}, {n:'Dzuhur', t:t.Dhuhr}, {n:'Ashar', t:t.Asr}, {n:'Maghrib', t:t.Maghrib}, {n:'Isya', t:t.Isha}];
                    let next = s.find(x => (parseInt(x.t.split(':')[0])*60 + parseInt(x.t.split(':')[1])) > cur) || s[0];
                    document.getElementById('prayer-name').innerText = next.n;
                    document.getElementById('prayer-time').innerText = next.t;
                    const [nH, nM] = next.t.split(':'); nextPrayerTime = new Date(); nextPrayerTime.setHours(nH, nM, 0);
                    if (nextPrayerTime < now) nextPrayerTime.setDate(nextPrayerTime.getDate() + 1);
                }

                function startCountdown() {
                    setInterval(() => {
                        if (!nextPrayerTime) return;
                        const diff = nextPrayerTime - new Date(); 
                        if (diff <= 0) { detectGPS(); return; }
                        const h = Math.floor(diff/3600000).toString().padStart(2,'0');
                        const m = Math.floor((diff%3600000)/60000).toString().padStart(2,'0');
                        const s = Math.floor((diff%60000)/1000).toString().padStart(2,'0');
                        document.getElementById('countdown').innerText = `-${h}:${m}:${s}`;
                    }, 1000);
                }
            </script>
        </section>

        <section id="module-menu">
            <div class="mt-24 text-center px-8">
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">Portal Darussalam</h1>
                <p class="text-xs text-slate-400 font-medium">Digital Madrasah Ecosystem</p>
            </div>
            <div class="grid grid-cols-2 gap-4 p-6">
                <div class="bg-white border p-5 rounded-2xl flex flex-col items-center"><i class="fa-solid fa-mosque text-teal-600 mb-2"></i><span class="text-xs font-bold">PROFIL</span></div>
                <div class="bg-white border p-5 rounded-2xl flex flex-col items-center"><i class="fa-solid fa-book-open text-blue-600 mb-2"></i><span class="text-xs font-bold">KEGIATAN</span></div>
                <div class="bg-white border p-5 rounded-2xl flex flex-col items-center"><i class="fa-solid fa-file-signature text-amber-600 mb-2"></i><span class="text-xs font-bold">DAFTAR</span></div>
                <div class="bg-white border p-5 rounded-2xl flex flex-col items-center"><i class="fa-solid fa-heart-pulse text-rose-600 mb-2"></i><span class="text-xs font-bold">DONASI</span></div>
            </div>
        </section>

        <section id="module-nav">
            <style>
                .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 500px; background-color: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0 28px 0; border-top: 1px solid #f1f5f9; z-index: 100; }
                .nav-item { color: #0d9488; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
            </style>
            <nav class="bottom-nav">
                <a onclick="location.reload()" class="nav-item"><i class="fa-solid fa-house-chimney text-xl"></i><span class="text-[10px] mt-1">Beranda</span></a>
                <a onclick="toggleQuran()" class="nav-item"><i class="fa-solid fa-book-quran text-xl"></i><span class="text-[10px] mt-1">Quran</span></a>
                <a onclick="toggleCalendar()" class="nav-item"><i class="fa-solid fa-calendar-days text-xl"></i><span class="text-[10px] mt-1">Kalender</span></a>
                <a onclick="toggleDoa()" class="nav-item"><i class="fa-solid fa-hands-praying text-xl"></i><span class="text-[10px] mt-1">Doa</span></a>
            </nav>

            <div id="location-sheet-bg" onclick="toggleLocationSheet()" class="fixed inset-0 bg-slate-900/40 z-[250] hidden opacity-0 transition-opacity duration-300 backdrop-blur-sm"></div>
            <div id="location-sheet" class="fixed bottom-0 left-0 right-0 bg-white z-[300] rounded-t-[32px] p-6 translate-y-full transition-transform duration-500 max-w-[500px] mx-auto shadow-2xl">
                <div class="w-12 h-1.5 bg-slate-100 rounded-full mx-auto mb-6"></div>
                <h3 class="text-center text-xs font-bold text-slate-800 mb-6 uppercase tracking-widest">Atur Wilayah</h3>

                <div class="space-y-4">
                    <button onclick="detectGPS()" class="w-full flex items-center justify-between p-4 rounded-2xl bg-teal-50 text-teal-700 active:scale-95 transition-all">
                        <div class="flex items-center gap-4">
                            <i class="fa-solid fa-location-crosshairs text-lg"></i>
                            <div class="text-left">
                                <p class="text-[10px] font-bold uppercase">Lokasi Saat Ini</p>
                                <p class="text-[9px] opacity-70">Otomatis via GPS</p>
                            </div>
                        </div>
                        <i class="fa-solid fa-chevron-right text-xs opacity-30"></i>
                    </button>

                    <div class="relative">
                        <input type="text" id="loc-search-input" oninput="handleSearch(this.value)" placeholder="Cari Kecamatan / Kabupaten..." 
                               class="w-full p-4 pl-12 rounded-2xl bg-slate-50 text-xs border-none focus:ring-2 focus:ring-teal-500 font-bold uppercase">
                        <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                        <div id="search-results-panel" class="hidden absolute left-0 right-0 mt-2 bg-white border rounded-2xl shadow-2xl z-[310] max-h-40 overflow-y-auto"></div>
                    </div>
                    <button onclick="toggleLocationSheet()" class="w-full p-4 text-slate-400 font-bold text-[10px] uppercase">Tutup</button>
                </div>
            </div>

            <script>
                function toggleLocationSheet() {
                    const sheet = document.getElementById('location-sheet');
                    const bg = document.getElementById('location-sheet-bg');
                    if (sheet.classList.contains('translate-y-full')) {
                        sheet.classList.remove('translate-y-full');
                        bg.classList.remove('hidden');
                        setTimeout(() => bg.classList.add('opacity-100'), 10);
                        pushState('location');
                    } else { history.back(); }
                }

                function detectGPS() {
                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(async (pos) => {
                            updateByCoords(pos.coords.latitude, pos.coords.longitude);
                            toggleLocationSheet();
                        }, () => alert("Gagal akses GPS"));
                    }
                }

                let searchTimer;
                function handleSearch(val) {
                    clearTimeout(searchTimer);
                    const panel = document.getElementById('search-results-panel');
                    if (val.length < 3) { panel.classList.add('hidden'); return; }
                    searchTimer = setTimeout(async () => {
                        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${val}&countrycodes=id&limit=5`);
                        const data = await res.json();
                        if (data.length > 0) {
                            panel.classList.remove('hidden');
                            panel.innerHTML = data.map(item => {
                                const name = item.display_name.split(',');
                                return `<div class="search-item" onclick="updateByCoords(${item.lat}, ${item.lon}, '${name[0]}')">
                                    <p>${name[0]}</p><span>${name.slice(1, 3).join(',')}</span>
                                </div>`;
                            }).join('');
                        }
                    }, 500);
                }

                async function updateByCoords(lat, lon, manualName = null) {
                    let finalName = manualName;
                    if (!finalName) {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                        const data = await res.json();
                        finalName = data.address.village || data.address.suburb || data.address.city || "Lokasi Aktif";
                    }
                    document.getElementById('location-text').innerText = finalName;
                    localStorage.setItem('last_location', finalName);
                    const pRes = await fetch(`https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`);
                    const pData = await pRes.json();
                    setPrayerUI(pData.data.timings);
                    if (manualName) toggleLocationSheet();
                }
            </script>
        </section>

    </div>

    <script>
        function updateDateTime() {
            const now = new Date();
            const ds = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
            const ms = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            document.getElementById('full-date').innerText = `${ds[now.getDay()]}, ${now.getDate()} ${ms[now.getMonth()]} ${now.getFullYear()} M`;
        }

        window.onload = () => {
            updateDateTime();
            const lastLoc = localStorage.getItem('last_location');
            if(lastLoc) document.getElementById('location-text').innerText = lastLoc;
            detectGPS(); 
            startCountdown();
        };
    </script>
</body>
</html>
